              properties:
                before: { type: object, description: 'before-сторона, опц. { label }' }
                after: { type: object, description: 'after-сторона, опц. { label }' }
                display_order: { type: integer }
      responses:
        '201': { description: '{ item }' }
        '400': { description: Невалидное тело }
        '404': { description: Блок не найден }

  /functions/v1/admin-landing-blocks/{id}/items/reorder:
    parameters:
