openapi: 3.1.0
info:
  title: Runpik Backend API
  version: '2026-07-19'
  description: |
    AI-сервис продуктовой фотографии. Документация описывает client-facing
    API контракт: Edge Functions, PostgREST endpoints для прямого доступа
    к таблицам, RPCs и Supabase Auth endpoints.

    ## Архитектура

    - **Supabase Cloud** (project ref `wnbtsqfdlbjwtetppdng`, регион `eu-central-1` Frankfurt)
    - **8 Edge Functions:** `/product-analyze`, `/image-generate`, `/shot-types`, `/faq`, `/delete-project`, `/delete-generation`, `/admin`, `/process-account-deletions`
    - **Google Gemini API** — `gemini-2.5-flash` для vision/text, `gemini-2.5-flash-image` для генерации
    - **Storage buckets:** `inputs` (приватный, 10 MiB max), `outputs` (публичный, постоянный public CDN URL)

    ## Двухстадийный pipeline генерации

    1. Frontend загружает фото в `inputs/{user_id}/...` Storage bucket
    2. `POST /functions/v1/product-analyze` → Gemini Flash text возвращает `ProductAnalysis` JSON + кеширует
    3. Frontend проверяет `analysis.is_suitable.verdict` — если `false`, показывает blockers
    4. Frontend дёргает `GET /functions/v1/shot-types` для рендера UI выбора типа кадра
    5. `POST /functions/v1/image-generate` → Gemini Flash Image генерирует output, кладёт в `outputs/{user_id}/...`, возвращает постоянный public CDN URL

    ## Аутентификация

    Большинство endpoints требуют **двух заголовков**:
    - `apikey` — anon JWT проекта (публичный, можно вшивать в клиент — защита данных через RLS)
    - `Authorization: Bearer <user_jwt>` — JWT залогиненного юзера, срок ~1 час

    Получение JWT: `POST /auth/v1/token?grant_type=password` с email и password.

    Также поддерживается соцлогин (тот же итоговый JWT, через Supabase SDK, не REST-эндпоинт): **Google** (Android/iOS — нативный `signInWithIdToken`; Web — `signInWithOAuth` redirect) и **Apple Sign-In** (iOS native). Конфигурируется в Supabase Auth providers.

    ## Проекты (workspaces)

    Каждая генерация и каждый анализ принадлежит project'у. У юзера **всегда минимум 1 project** (backend invariant). Default project автоматически создаётся при signup с именем = сегодняшняя UTC дата в формате `YYYY-MM-DD` (например `2026-05-21`).

    ## Mock mode

    Real AI-генерация **включена** (с 2026-05-31): Gemini Flash Image billing активен, mock выключен (`RUNPIK_MOCK_GENERATION=false`). `/image-generate` и `/image-improve` делают настоящую генерацию/edit. Mock — dev-only тумблер; в prod-ответах поля `mock` нет (если видишь `"mock": true` — mock временно включён для QA).

    ## Подробная narrative-style документация

    Полные descriptions, troubleshooting, Flutter integration patterns:
    [github.com/HovhannisyanKaro/runpik-backend/blob/main/docs/API.md](https://github.com/HovhannisyanKaro/runpik-backend/blob/main/docs/API.md) (приватный repo).

  contact:
    name: Runpik
    email: legal@runpik.com
    url: https://runpik.com
  license:
    name: Proprietary
    url: https://runpik.com/terms.html

servers:
  - url: https://wnbtsqfdlbjwtetppdng.supabase.co
    description: Production (Supabase Cloud, eu-central-1)
  - url: https://wnbtsqfdlbjwtetppdng.functions.supabase.co
    description: Edge Functions direct URL (alternative to /functions/v1/ через gateway)

security:
  - BearerJWT: []
    AnonApiKey: []

tags:
  - name: Auth
    description: Регистрация, логин, восстановление пароля, выход. Endpoints Supabase Auth с префиксом `/auth/v1/`.
  - name: Profile
    description: Профиль пользователя — чтение, обновление locale, запись ToS/Privacy acceptance, schedule deletion. Работа через PostgREST.
  - name: Projects
    description: Управление проектами (workspace-like группировка). У юзера всегда минимум 1 project. CRUD через PostgREST, delete — через Edge Function (для blob cleanup).
  - name: AI Pipeline
    description: Двухстадийный AI flow — анализ фото (Stage 1, бесплатно) + генерация изображения (Stage 2, кредиты камня — Quartz=4). Plus каталог типов кадров для UI.
  - name: Admin
    description: Backend admin endpoints — **только для пользователей с ролью superadmin**. 11 read-only routes для inspection runtime config, prompts, audit log, etc. Regular users → 403.
  - name: Inspire
    description: Каталог визуальных стилей (таб Inspire). Публичный `GET /styles` (опубликованные стили) + admin CRUD `/admin-styles` (роли curator/admin/superadmin).
  - name: Environments
    description: '«Фото окружения» — user-owned переиспользуемые сцены-окружения (analog Inspire Style, но юзер создаёт их из своего фото). Выбираются на генерацию, взаимоисключимы со стилем. Анализатор описывает только окружение, вычищая любой чужой товар и весь текст. `scene_prompt` — backend-only.'
  - name: Landing
    description: Контент-блоки маркетингового лендинга runpik.com (не Home-таб приложения). Публичный `GET /landing-blocks` (активные секции + публичные карточки) + admin CRUD `/admin-landing-blocks` (роли admin/superadmin). Первый тип — hero (карточки before/after).
  - name: RPCs
    description: Database-level функции — баланс кредитов, planning/cancel account deletion.

paths:

  # ============================================================
  # AUTH
  # ============================================================

  /auth/v1/token:
    post:
      tags: [Auth]
      summary: Войти по email и паролю
      description: |
        Получить `access_token` (JWT) для залогиненного юзера. Возвращает также `refresh_token` для автоматического продления сессии. Срок жизни access_token ~1 час, refresh_token живёт намного дольше (несколько недель).

        В Flutter SDK эта операция вызывается через `supabase.auth.signInWithPassword(email: ..., password: ...)`. SDK сохраняет токены в secure storage устройства и автоматически refresh'ит когда подходит к expiry.

        В Postman сохрани `access_token` в env variable через Tests script — будет использоваться во всех authenticated endpoints как `Authorization: Bearer {{access_token}}`.
      security:
        - AnonApiKey: []
      parameters:
        - in: query
          name: grant_type
          required: true
          schema:
            type: string
            enum: [password]
          description: Тип grant — `password` для login по email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: hovhannisyankaro1992@gmail.com
                password:
                  type: string
                  format: password
                  example: MySecret123
      responses:
        '200':
          description: Успешный логин — возвращены токены и user metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: 'JWT для использования в `Authorization: Bearer <jwt>` header'
                  token_type:
                    type: string
                    enum: [bearer]
                  expires_in:
                    type: integer
                    description: Срок жизни access_token в секундах (обычно 3600)
                  expires_at:
                    type: integer
                    description: Unix timestamp когда access_token истечёт
                  refresh_token:
                    type: string
                    description: Токен для refresh access_token без повторного логина
                  user:
                    $ref: '#/components/schemas/AuthUser'
        '400':
          description: Невалидные email или password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Слишком много попыток входа — rate limit (30 sign-ins per 5 min per IP)

  /auth/v1/signup:
    post:
      tags: [Auth]
      summary: Зарегистрироваться по email и паролю
      description: |
        Создать нового юзера. После успешной регистрации **триггер `handle_new_user`** автоматически:
        1. Создаёт строку в `public.profiles` с `display_name` из email local-part, `locale = 'en'`, тариф **Free** (`plan_id`) и `cycle_started_at = now()`
        2. Выдаёт **10 free credits** через `credits_transactions(amount=+10, reason='subscription_grant', bucket='subscription')` — норма тарифа Free (`subscription_plans.free.credits_monthly`). Кэш `profiles.subscription_credits` обновляет триггер. _(До 2026-06-16 было +3 `signup_bonus`.)_
        3. Создаёт **default project** в `public.projects` с именем = сегодняшняя UTC дата (`YYYY-MM-DD`)

        Email confirmation выключен в MVP — сессия активна сразу после signup, не нужно ждать письмо.

        **После signup frontend обязан** записать acceptance ToS/Privacy через PATCH `/rest/v1/profiles` (см. Profile секцию).
      security:
        - AnonApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 6
                data:
                  type: object
                  description: 'Произвольные user_metadata, например `{full_name: "..."}`. Trigger подхватит из `raw_user_meta_data.full_name` для `profiles.display_name`.'
      responses:
        '200':
          description: Юзер создан, сессия активна
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/AuthUser'
                  session:
                    type: object
                    description: Идентично response 200 от /auth/v1/token
        '400':
          description: Невалидный email, password too weak, или email уже зарегистрирован
        '422':
          description: Password не соответствует минимальным требованиям

  /auth/v1/recover:
    post:
      tags: [Auth]
      summary: Запросить email для сброса пароля
      description: |
        Триггерит отправку письма от **Runpik <noreply@runpik.com>** (через Resend custom SMTP) со ссылкой для сброса пароля.

        **Security best practice:** endpoint всегда возвращает 200, даже если email не зарегистрирован (не leak'ает существование аккаунтов).

        Ссылка в письме ведёт на Supabase verify endpoint → редирект на `redirectTo` (по умолчанию `https://runpik.com`). Frontend должен detect recovery session через `AuthChangeEvent.passwordRecovery` и показать экран ввода нового пароля.
      security:
        - AnonApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                redirect_to:
                  type: string
                  format: uri
                  description: |
                    URL куда редиректнуть после успешного verify. Должен быть в whitelist Supabase (Site URL + Additional Redirect URLs). Сейчас allowed: `https://runpik.com/**`, `https://www.runpik.com/**`, `http://localhost:*`. Для Flutter deep links добавь свою scheme в whitelist через Dashboard.
                  example: io.runpik://reset-password
      responses:
        '200':
          description: Запрос принят (всегда 200 — security)
          content:
            application/json:
              schema:
                type: object
                example: {}

  /auth/v1/logout:
    post:
      tags: [Auth]
      summary: Выйти и инвалидировать refresh_token
      description: |
        Инвалидирует refresh_token на сервере (новый access_token нельзя получить). Access_token продолжает работать до своего expiry (~1 час максимум).

        Frontend должен дополнительно очистить локальное состояние приложения и navigate на login screen.
      responses:
        '204':
          description: Logout успешен (no content)

  # ============================================================
  # PROFILE
  # ============================================================

  /rest/v1/profiles:
    get:
      tags: [Profile]
      summary: Получить свой профиль
      description: |
        Возвращает один row из `public.profiles` — твой собственный профиль. RLS гарантирует что юзер видит только свой профиль (`auth.uid() = id`).

        Filter по `id=eq.{auth_uid}` обязателен (или PostgREST вернёт ВСЕ профили — но RLS отсеит до твоего, так что результат одинаковый).
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
          description: Filter `eq.{твой UID}`. Например `eq.dd254858-8b9c-474d-8eb8-d4c0e9540751`.
          example: eq.dd254858-8b9c-474d-8eb8-d4c0e9540751
        - in: query
          name: select
          schema:
            type: string
          description: Какие колонки вернуть. `*` для всех.
          example: '*'
      responses:
        '200':
          description: Array из одного row'а (даже если фильтр matched 0 — массив пустой, не ошибка)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'
    patch:
      tags: [Profile]
      summary: Обновить свой профиль (locale, ToS/Privacy acceptance, display_name, avatar)
      description: |
        Обновляет один row в `public.profiles` — свой собственный. RLS гарантирует `auth.uid() = id`.

        **Use cases:**
        - Сохранить выбранный язык: `{locale: 'ru'}`
        - Записать acceptance ToS/Privacy после signup или при re-acceptance: `{tos_accepted_at: '2026-05-22T10:00:00Z', privacy_accepted_at: '2026-05-22T10:00:00Z'}`
        - Изменить display name или avatar: `{display_name: 'Karo', avatar_url: 'https://...'}`

        Все поля optional — отправляй только то что хочешь обновить.

        **Что НЕЛЬЗЯ обновлять через PostgREST:** `id`, `email` (управляется Supabase Auth), `role` (только superadmin через будущий `admin_set_role` RPC), `deletion_scheduled_at` (через RPC `schedule_my_account_deletion()`).
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
          description: Filter `eq.{твой UID}` — обновлять только свой row.
          example: eq.dd254858-8b9c-474d-8eb8-d4c0e9540751
        - in: header
          name: Prefer
          schema:
            type: string
            example: return=representation
          description: '`return=representation` чтобы получить обновлённый row в response. Без него response пустой.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                locale:
                  type: string
                  enum: [en, ru, hy]
                  description: 'Язык интерфейса. `hy` (армянский) допустим в CHECK constraint, но UI translations пока не shipped.'
                tos_accepted_at:
                  type: string
                  format: date-time
                  description: ISO timestamp когда юзер принял Terms of Service.
                privacy_accepted_at:
                  type: string
                  format: date-time
                  description: ISO timestamp когда юзер принял Privacy Policy.
                display_name:
                  type: string
                avatar_url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Профиль обновлён
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'

  # ============================================================
  # PROJECTS
  # ============================================================

  /rest/v1/projects:
    get:
      tags: [Projects]
      summary: Список моих проектов
      description: |
        Возвращает все projects текущего юзера. RLS отсеивает чужие (`auth.uid() = user_id`).

        **Best-practice sort order:** `is_pinned DESC, sort_order ASC, created_at DESC`. Pinned projects всегда наверху, потом в порядке user-set sort_order, ties tie-breaker'ятся по recency.

        В UI обычно показывается как drawer/sidebar.
      parameters:
        - in: query
          name: select
          schema:
            type: string
          example: '*'
        - in: query
          name: order
          schema:
            type: string
          description: Best-practice ordering для UI sidebar
          example: is_pinned.desc,sort_order.asc,created_at.desc
      responses:
        '200':
          description: Массив projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      summary: Создать новый проект
      description: |
        Создаёт project. **`user_id` авто-заполняется через DEFAULT auth.uid()** — не передавай его явно (передашь — должно совпадать с твоим JWT UID или RLS отклонит).

        `name` обязателен, 1-30 символов (CHECK constraint).

        После create — RLS позволит UPDATE/DELETE/SELECT этого row'а владельцу.
      parameters:
        - in: header
          name: Prefer
          schema:
            type: string
            example: return=representation
          description: '`return=representation` чтобы получить созданный row с `id` в response.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 30
                  example: Flowers
                  description: Имя проекта 1-30 chars (CHECK constraint enforces).
                is_pinned:
                  type: boolean
                  default: false
                  description: Закреплён ли наверху списка.
                is_public:
                  type: boolean
                  default: false
                  description: 'Schema-only пока. RLS оставляет всё private до пер-image public/private flag.'
                sort_order:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Project создан
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '400':
          description: Имя пустое или длиннее 30 chars (CHECK constraint violation)
        '403':
          description: Попытка передать чужой `user_id`

  /rest/v1/projects/update:
    patch:
      tags: [Projects]
      summary: Переименовать / запинить / переставить project
      description: |
        Обновляет существующий project. Передавай только те поля что хочешь изменить. Все поля optional.

        **Note:** этот URL — псевдо-path для документации. В реальности используется тот же `/rest/v1/projects?id=eq.{uuid}` с PATCH method (PostgREST convention).
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
          description: Filter `eq.{project_id}`
          example: eq.a8d1c0e7-...
        - in: header
          name: Prefer
          schema:
            type: string
            example: return=representation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 30
                is_pinned:
                  type: boolean
                is_public:
                  type: boolean
                sort_order:
                  type: integer
      responses:
        '200':
          description: Project обновлён
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

  /functions/v1/delete-project:
    post:
      tags: [Projects]
      summary: Удалить project (с blob cleanup и invariant maintenance)
      description: |
        Удаляет project + все его generations + Storage output blobs. **CASCADE на FK** удаляет generations rows автоматически; **этот Edge Function** удаляет blobs из Storage (PostgreSQL не может trogать Storage API).

        **Analyses survive** — их `project_id` ставится в NULL через `ON DELETE SET NULL`. Cache analyses (per `user_id + image_hash`) переживает удаление project'а — это интенционально (Gemini вызовы дорогие).

        **Invariant ">= 1 project":** если после удаления у юзера 0 projects, backend **автоматически** создаёт новый default project с именем = сегодняшняя UTC дата (response содержит `new_default_project`). Это значит `/product-analyze` и `/image-generate` могут trust invariant и не имеют fallback логики "у юзера 0 projects".

        **Не используй прямой PostgREST DELETE на projects** — он удалит DB row но оставит orphaned blobs в Storage + сломает invariant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id]
              properties:
                project_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Project удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
                  project_id:
                    type: string
                    format: uuid
                  blobs_deleted:
                    type: integer
                    description: Сколько output blobs было удалено из Storage
                  new_default_project:
                    type: object
                    description: |
                      Присутствует **только если** после deletion у юзера осталось 0 projects — backend auto-создал новый default с именем = today's UTC date. Frontend должен переключить UI на этот project.
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                        example: '2026-05-22'
        '400':
          description: Missing `project_id` в body
        '403':
          description: Project не принадлежит caller'у
        '404':
          description: Project не найден

  /functions/v1/delete-generation:
    post:
      tags: [AI Pipeline]
      summary: Удалить одну generation (с blob cleanup)
      description: |
        Удаляет одну конкретную generation — row в `generations` table + output blob в Storage. Используется для UI feature "Delete photo" (юзер удаляет один сгенерированный output, не весь project).

        **Что удаляется:**
        - Row в `public.generations`
        - Blob `outputs/{user_id}/{generation_id}.jpg` в Storage

        **Что PRESERVED:**
        - **Analysis row** (cached AI work — Gemini Flash text call). `generations.analysis_id` имеет `ON DELETE SET NULL`, сама analysis row survives. Cache валиден по `(user_id, image_hash)` — юзер может re-generate того же фото без повторного payment'a за анализ.
        - **Input blob** (`inputs/{user_id}/IMG_xyz.jpg`) — same input может иметь несколько generations.
        - **Credits ledger** (`credits_transactions` row с `reason='generation'`) — append-only, never deleted. Generation была успешно delivered → credit заслуженно списан. **No refund** (delete is user choice, not failure).

        **Не используй PostgREST DELETE на generations** — нет RLS DELETE policy, plus orphan blobs в Storage. Этот Edge Function — единственный правильный способ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [generation_id]
              properties:
                generation_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Generation удалена
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
                  generation_id:
                    type: string
                    format: uuid
                  blob_deleted:
                    type: boolean
                    description: '`true` если output blob successfully removed; `false` если blob был NULL (failed generation) или Storage delete fail (best-effort — orphan blob может быть swept future cleanup cron''ом).'
        '400':
          description: Missing `generation_id` в body / invalid JSON
        '403':
          description: Generation не принадлежит caller'у
        '404':
          description: Generation не найдена
        '409':
          description: 'Нельзя удалить оригинал (v0) пока есть improvements. Body содержит `code: CANNOT_DELETE_ORIGINAL_WITH_IMPROVEMENTS`.'

  /functions/v1/image-improve:
    post:
      tags: [AI Pipeline]
      summary: Улучшить генерацию (новая версия)
      description: |
        **Фича «Improvements».** Итеративно улучшает существующую генерацию по text-промпту, создавая **новую версию** в той же группе. **Биллинг (с 2026-06-16; операции 2026-07-11):** списывается цена операции `image-improve` камня в кредитах (Quartz = 3, `gem_operations`) через `spend_credits` **по факту успеха**; камень наследуется от исходной версии (`source.gem_id`, fallback — дефолтный IMAGE). При сбое строка версии удаляется, кредиты не списываются.

        Каждая версия — обычная строка `generations`: `root_generation_id` (группа), `version_index` (0=оригинал, 1=V1…), `improvement_prompt`, `source_generation_id` (откуда улучшали). MVP **linear**: новая версия = `max(version_index)+1`.

        **Gemini:** вариант A (image-to-image) — output предыдущей версии как reference + improvement-текст. Идентичность продукта подкрепляется из оригинального анализа.

        **Soft-лимит:** `MAX_VERSIONS_PER_GENERATION = 5` (config, не schema). **Failed improvement** → строка версии удаляется, кредиты не списываются (charge-on-success; не остаётся `failed` в списке).

        **List версий:** `GET /rest/v1/generations?root_generation_id=eq.{root}&order=version_index.asc`. **Move-to-project** двигает всю группу (триггер; split запрещён).

        **Mock mode:** при `RUNPIK_MOCK_GENERATION=true` копирует output источника, response содержит `mock: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [generation_id, improvement_prompt]
              properties:
                generation_id:
                  type: string
                  format: uuid
                  description: Версия-источник (любая версия группы). Должна быть `done` с output'ом и принадлежать caller'у.
                improvement_prompt:
                  type: string
                  minLength: 1
                  maxLength: 300
                  description: Текст улучшения. Проходит sanitizeUserText перед Gemini.
                  example: сделай фон теплее
                idempotency_key:
                  type: string
                  format: uuid
                  description: Client-supplied UUID. Повторный запрос с тем же ключом → replay существующей версии (без повторного списания).
                gem_id:
                  type: string
                  format: uuid
                  description: >-
                    Камень для этого improve (2026-07-19). Если задан — должен быть активным IMAGE-камнем
                    (чужой тип → 400 "Model is not for IMAGE content") и поддерживать операцию image-improve
                    (иначе → 400 "This gem does not support improve"). Не задан → наследуется камень
                    версии-источника (legacy NULL → дефолтный IMAGE). Цена improve — из выбранного камня,
                    поэтому версии одной группы могут быть на разных IMAGE-камнях. Пишется в generations.gem_id.
      responses:
        '200':
          description: Новая версия создана (или idempotent replay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  generation_id:
                    type: string
                    format: uuid
                    description: НОВАЯ версия
                  root_generation_id:
                    type: string
                    format: uuid
                  version_index:
                    type: integer
                    example: 1
                  source_generation_id:
                    type: string
                    format: uuid
                  improvement_prompt:
                    type: string
                  output_url:
                    type: string
                  output_path:
                    type: string
                  expires_in_seconds:
                    type: integer
                    example: 2592000
                  status:
                    type: string
                    example: done
                  credits_remaining:
                    type: integer
                  idempotent_replay:
                    type: boolean
                    description: present только при idempotency replay
                  mock:
                    type: boolean
                    description: present только при RUNPIK_MOCK_GENERATION=true
        '400':
          description: 'Пустой/слишком длинный prompt (`code: PROMPT_EMPTY` / `PROMPT_TOO_LONG`), missing generation_id, invalid JSON, ИЛИ невалидный gem_id: не UUID / не IMAGE-камень ("Model is not for IMAGE content") / камень без image-improve ("This gem does not support improve")'
        '401':
          description: Нет/невалидный JWT
        '402':
          description: 'Недостаточно кредитов (`code: INSUFFICIENT_CREDITS`)'
        '403':
          description: Source generation не принадлежит caller'у
        '404':
          description: generation_id не найден
        '409':
          description: 'Лимит версий (`code: VERSION_LIMIT_REACHED`) или source не готов (`code: SOURCE_NOT_READY`)'
        '502':
          description: 'Image generation сбой (`code: GEMINI_FAILURE`, все движки камня после retry+fallback). Строка версии удалена, кредиты НЕ списаны (charge-on-success).'

  /rest/v1/generations:
    patch:
      tags: [Projects]
      summary: Переместить generation в другой project
      description: |
        Используется для feature "Move generation to other project". RLS проверяет ownership generation'а (`auth.uid() = user_id`). Новый `project_id` должен также принадлежать caller'у (FK + RLS check).

        UI pattern: long-press на generation card → menu → "Переместить в..." → bottom sheet с projects → select → patch.
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
          description: Filter `eq.{generation_id}`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id]
              properties:
                project_id:
                  type: string
                  format: uuid
                  description: UUID нового project'а (должен принадлежать тебе же)
      responses:
        '200':
          description: Generation moved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Generation'

  # ============================================================
  # AI PIPELINE
  # ============================================================

  /functions/v1/product-analyze:
    post:
      tags: [AI Pipeline]
      summary: Stage 1 — анализ загруженного фото
      description: |
        **Первый шаг двухстадийного pipeline.** Вызывает Gemini Flash (vision) для распознавания продукта на фото и возвращает структурированный `ProductAnalysis` JSON, который потом используется в `/image-generate`.

        **Бесплатный** — кредиты не списываются.

        **Кешируется** по ключу `(user_id, image_hash, prompt_version)`. Image_hash — SHA-256 байтов файла. Повторный вызов с тем же image (например юзер пробует ещё раз с другими параметрами) возвращает мгновенно с `cached: true`, без обращения к Gemini.

        **Critical: проверяй `analysis.is_suitable.verdict` перед /generate.** Если `verdict = false` — показывай экран "это изображение не подходит" с `is_suitable.blockers`, не вызывай `/image-generate` (там 422). `/product-analyze` всегда возвращает 200 при успешном вызове Gemini (verdict — бизнес-результат, не HTTP ошибка).

        **Frontend flow:**
        1. Загрузи фото в Storage: `inputs/{user_id}/{filename}.jpg`
        2. Передай `input_image_path` сюда
        3. Сохрани `analysis_id` для следующего шага
        4. Покажи UI выбора shot_type на основе `recommended_shot_type` (default) + полного каталога из `/shot-types`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input_image_path]
              properties:
                input_image_path:
                  type: string
                  description: |
                    Путь к фото внутри Storage bucket `inputs`. Должен начинаться с `{user.id}/`.
                  example: dd254858-8b9c-474d-8eb8-d4c0e9540751/IMG_test.jpg
                project_id:
                  type: string
                  format: uuid
                  description: |
                    UUID проекта в `public.projects`. Optional — если не передал, backend использует первый проект юзера (sorted by `is_pinned DESC, sort_order, created_at DESC`). Invariant гарантирует >= 1 project.
                force_reanalyze:
                  type: boolean
                  default: false
                  description: |
                    Если `true`, обходит кеш `analyses` и заново зовёт Gemini. Используется когда хочешь пересмотреть анализ.
      responses:
        '200':
          description: Анализ успешен. **ВАЖНО — проверяй `analysis.is_suitable.verdict`** прежде чем переходить к `/image-generate`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysis_id:
                    type: string
                    format: uuid
                    description: UUID строки в `analyses`. Передавай в `/image-generate`.
                  analysis:
                    $ref: '#/components/schemas/ProductAnalysis'
                  cached:
                    type: boolean
                    description: '`true` если результат из кеша (повторный вызов с тем же image).'
        '400':
          description: Malformed JSON или отсутствует `input_image_path`
        '403':
          description: '`input_image_path` не начинается с `{user.id}/` (попытка прочитать чужой файл)'
        '404':
          description: Input image не найден в bucket
        '502':
          description: Gemini Flash text fetch не удался / пустой ответ / невалидный JSON

  /functions/v1/image-generate:
    post:
      tags: [AI Pipeline]
      summary: Stage 2 — генерация изображения
      description: |
        **Второй шаг pipeline.** Берёт `ProductAnalysis` сохранённый в `/product-analyze`, строит Stage 2 prompt, прогоняет через движки выбранного **камня** (`gems`) с priority+retry+fallback, загружает output в `outputs` bucket, возвращает постоянный public CDN URL.

        **Биллинг (kebab-операции + платные опции с 2026-07-14):** списывается цена операции `image-generate` камня в **кредитах** (Quartz = **4**, `gem_operations`); при ФО сверху **платная опция** `environment` камня (`gem_paid_options`, стоимость = базовая операция + сумма платных опций). Камень — поле `gem_id` (optional; NULL → дефолтный камень IMAGE). Списание — **по факту успеха** (charge-on-success), сначала кошелёк `subscription`, потом `topup`. **При сбое генерации кредиты НЕ списываются** (refund не нужен — списания просто нет).

        **ФО-надбавка (платная опция `environment` с 2026-07-14):** при `environment_id` сверху списывается платная опция `environment` камня из `gem_paid_options` (Quartz = **1**) → итог **5**, отдельной строкой в леджере (`metadata.paid_option=environment`). Баланс гейтится на полную сумму. Цена отдаётся клиенту в `GET /gems` (`gems[].paid_options`).

        **Длительная операция:** 8 сек в mock mode, 10-30 сек реальный Gemini. Показывай loading state с прогрессом.

        **Verdict recheck:** если `analysis.is_suitable.verdict = false` — возвращает 422 **без charge'а кредита**. Defense-in-depth на случай если frontend пропустил blockers в `/product-analyze` response.

        **Real generation LIVE (с 2026-05-31):** billing включён, mock выключен — `/image-generate` делает настоящую AI-генерацию (10-30s). Mock — dev-only тумблер; в prod-ответах поля `mock` нет.

        **Output URL:** постоянный public CDN URL (bucket `outputs` публичный, не истекает). Собирается из `output_path` через `supabase.storage.from('outputs').getPublicUrl(output_path)`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [analysis_id]
              properties:
                analysis_id:
                  type: string
                  format: uuid
                  description: UUID анализа из `/product-analyze` response
                shot_type:
                  type: string
                  description: |
                    Slug типа кадра. Optional — если NULL, используется `analysis.regeneration_guidance.recommended_shot_type`, потом первый ключ в `SHOT_TYPE_BLOCKS[category]`. См. `/shot-types` endpoint для полного каталога.
                  example: catalog_studio
                user_text:
                  type: string
                  maxLength: 300
                  description: 'Свободный текст от пользователя. Включается в Stage 2 prompt как "soft preference". Санитизация: strips ``<>{}[]```, prompt injection patterns, обрезает до 300 chars.'
                lighting:
                  $ref: '#/components/schemas/Lighting'
                aspect_ratio:
                  $ref: '#/components/schemas/AspectRatio'
                project_id:
                  type: string
                  format: uuid
                  description: |
                    UUID проекта. Optional — priority резолва: explicit `project_id` > `analysis.project_id` > первый project юзера. Generation row всегда несёт `project_id` (NOT NULL).
                style_id:
                  type: string
                  format: uuid
                  description: |
                    UUID опубликованного Inspire-стиля (см. `GET /functions/v1/styles`). Optional. Подмешивает `style_prompt` стиля как секцию **STYLE OVERLAY** в конец Stage 2 prompt. Если задан `style_id` **без** `shot_type` — style-only режим (без shot-type блока; композицию/свет задаёт стиль). Если оба — shot-type блок + overlay. Категория продукта не должна быть в `excluded_categories` стиля (иначе 400). Полностью backward-compatible — запрос без `style_id` идентичен прежнему.
                environment_id:
                  type: string
                  format: uuid
                  description: |
                    UUID окружения «Фото окружения» (см. `GET /functions/v1/environments`). Optional. Подмешивает `scene_prompt` окружения как секцию **ENVIRONMENT OVERLAY** в конец Stage 2 prompt (исходное фото окружения в модель НЕ уходит — только текст). **ФО = только фон/локация:** всегда компонуется с `shot_type` (презентация) и `lighting` — меняет только сеттинг/фон, не заменяет их (свет берётся из секции LIGHTING). Для setting-aware шота (`on_model`) SCENE отдаёт локацию оверлею. **Взаимоисключимо только со `style_id`** (заданы оба → 400). Окружение должно принадлежать юзеру (иначе 403/404). Пишется в `generations.environment_id`.
                product_name:
                  type: string
                  maxLength: 60
                  nullable: true
                  description: |
                    Имя товара (заголовок фото), зафиксированное на Create — обычно отредактированное `analysis.product.product_name` из `/product-analyze`. Optional. Санитизируется (strip control chars, trim, cap 60). Пустое/отсутствует → null (фронт показывает fallback). Пишется в `generations.product_name`. **Photo-level:** Improve-версии наследуют, переименование позже синхронится по всей группе версий (PATCH `/rest/v1/generations`). В Stage 2 НЕ уходит. (2026-06-07)
                gem_id:
                  type: string
                  format: uuid
                  description: |
                    Какой «камень» (`gems`) использовать. Optional — NULL → дефолтный камень для IMAGE. Должен быть UUID активного камня. Цена генерации = операция `image-generate` камня (Quartz = 4 кредита, `gem_operations`). Пишется в `generations.gem_id`; реально отработавший движок — в `generations.engine_id`. (2026-06-16)
                dry_run:
                  type: boolean
                  description: |
                    **Предпросмотр промпта (superadmin only, 2026-07-14).** `true` → бэкенд собирает финальный промпт ровно как в бою и возвращает `{ dry_run:true, prompt, model }` **без вызова движка, списания кредитов, записи в `generations` и Storage**. Не-superadmin → 403. Доступен на всех промпт-эндпоинтах (`/product-analyze`, `/image-generate`, `/image-improve`, `/card-copywriting`, `/card-generate` (+`brief`), `/card-improve`). Заменяет удалённые `/preview-prompt` и `/preview-environment-prompt`.
      responses:
        '200':
          description: 'Generation успешна. Поле `mock: true` присутствует если backend в mock-режиме.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: 'Malformed JSON / missing analysis_id / invalid lighting или aspect_ratio slug / `style_id` не UUID / стиль не найден или не опубликован / категория продукта в `excluded_categories` стиля / заданы и `style_id`, и `environment_id` / `environment_id` не UUID'
        '402':
          description: Недостаточно кредитов (`balance < стоимости камня`, Quartz = 4)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Insufficient credits
                  balance:
                    type: integer
                    example: 0
                  required:
                    type: integer
                    example: 4
        '403':
          description: '`analyses.user_id !== auth.uid()` — анализ не твой; или `environment_id` не принадлежит юзеру'
        '404':
          description: '`analysis_id` не найден / input image удалён между /analyze и /generate / `environment_id` не найден'
        '422':
          description: 'Verdict recheck failed — `analysis.is_suitable.verdict = false`. **Кредиты НЕ списаны.**'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  blockers:
                    type: array
                    items:
                      type: string
                  analysis_id:
                    type: string
                    format: uuid
        '500':
          description: 'DB error / Storage upload fail (кредиты не списаны) / Signed URL fail (генерация done + кредиты уже списаны, refund нет)'
        '502':
          description: 'Image generation fail — все движки камня упали (non-2xx / без inline data) после retry+fallback. **Кредиты НЕ списаны** (charge-on-success).'

  /functions/v1/app-config:
    get:
      tags: [AI Pipeline]
      summary: Публичный конфиг приложения (клиент тянет при старте)
      description: |
        Сектированный key/value конфиг UI-констант (`verify_jwt=false`). Клиент дёргает при СТАРТЕ и кэширует на сеанс (+ baked-in fallback на оффлайн). Запись — только superadmin (SQL пока). Первая секция `environment.match` = границы+дефолт ползунка Environment Match.
      responses:
        '200':
          description: Конфиг
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                    additionalProperties: true
                    example:
                      environment:
                        match: { min: 20, max: 80, default: 25 }
        '405':
          description: Метод не GET
        '500':
          description: DB failure

  /functions/v1/environments:
    get:
      tags: [Environments]
      summary: Список окружений юзера (i18n, signed URLs)
      description: |
        Возвращает окружения («Фото окружения») текущего юзера с локализованным `name` и **signed URL** на исходное фото (bucket приватный, TTL 30 дней).

        **Auth:** JWT юзера (`verify_jwt = true`). `scene_prompt` наружу НЕ отдаётся.
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            enum: [en, ru]
            default: en
          description: 'Локаль для `name`. Unsupported → fallback на `en` с `fallback_used: true`.'
      responses:
        '200':
          description: Список окружений
          content:
            application/json:
              schema:
                type: object
                properties:
                  environments:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnvironmentListItem'
                  locale:
                    type: string
                    enum: [en, ru]
                  fallback_used:
                    type: boolean
                  total:
                    type: integer
                  expires_in_seconds:
                    type: integer
                    example: 2592000
        '401':
          description: Нет/невалидный JWT
        '500':
          description: DB query failure
    post:
      tags: [Environments]
      summary: Создать окружение (анализ + сохранение, бесплатно)
      description: |
        Анализирует фото-референс сцены и сохраняет переиспользуемое окружение. Анализатор извлекает описание **только окружения** (поверхности, фон, свет, палитра, настроение), **вычищая любой чужой товар и весь текст/брендинг** (напр. скриншот с маркетплейса).

        **Бесплатно** (как `/product-analyze`) — кредиты/Gem не трогает. **`scene_prompt` наружу НЕ возвращается** (backend-only). Непригодное фото (нет пригодного окружения) → **422**, окружение НЕ сохраняется.

        **Flow:** сначала залей фото в bucket `environments` (path `{user_id}/{filename}`) через Storage SDK, затем пошли путь сюда.

        **Переименование/теги** — через PostgREST PATCH на `environments` (писать можно только `name`, `tags`), а не через эту функцию.

        **Scope:** `/image-generate` пока `environment_id` не потребляет (wiring — следующий слайс).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input_image_path]
              properties:
                input_image_path:
                  type: string
                  description: 'Путь в bucket `environments`, обязан начинаться с `{user_id}/`.'
                  example: 5bf54c31-1418-4282-bb0e-24565f4d121b/scene.jpg
                match_percent:
                  type: integer
                  description: 'Environment Match — % детальности анализа. Optional. Границы/дефолт из `GET /app-config` (`config.environment.match`); бэкенд клампит в [min,max]. Тиеры: Low <50 / Medium 50-70 / High 70+.'
                  example: 25
      responses:
        '200':
          description: 'Окружение создано (is_suitable.verdict = true)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentCreateResponse'
        '400':
          description: Невалидный JSON / нет `input_image_path`
        '401':
          description: Нет/невалидный JWT
        '403':
          description: '`input_image_path` не принадлежит юзеру'
        '404':
          description: Картинка не найдена в bucket
        '422':
          description: 'На фото нет пригодного окружения — не сохраняется. Body `{ error, blockers }`.'
        '500':
          description: DB / server misconfig
        '502':
          description: Gemini fetch fail / пустой ответ / невалидный JSON

  /functions/v1/environments/{id}:
    delete:
      tags: [Environments]
      summary: Удалить окружение (+ blob)
      description: 'Удаляет строку (FK `generations.environment_id` → SET NULL, исторические генерации переживают) + best-effort удаление blob под `{user_id}/`.'
      parameters:
        - $ref: '#/components/parameters/EnvironmentId'
      responses:
        '200':
          description: Удалено
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                  environment_id: { type: string, format: uuid }
                  blob_deleted: { type: boolean }
        '400':
          description: '`id` отсутствует / не UUID'
        '401':
          description: Нет/невалидный JWT
        '403':
          description: Окружение не принадлежит юзеру
        '404':
          description: Окружение не найдено

  /functions/v1/shot-types:
    get:
      tags: [AI Pipeline]
      summary: Каталог 28 типов кадров с i18n labels
      description: |
        Публичный read-only endpoint — каталог 28 shot types (7 категорий × 4 типа в каждой) с локализованными labels. Используется фронтом для рендера Shot Type Selection screen после `/product-analyze`.

        **No auth required** — `verify_jwt = false`. Cache `public, max-age=300` (5 мин edge CDN; снижено с 1ч в 2026-06-07).

        Backend-prompt-only поля (scene, framing, lighting, avoid_extras, angle_priority, final_check_extras) **не возвращаются** — они English-only для Gemini, фронту не нужны. Возвращаются UI-relevant `label` + `description` + `image_url`.

        **Editable (2026-06-07):** `label`/`description`/`image_url` мержатся из админ-оверрайдов (`shot_type_overrides` + bucket `shot-type-images`, редактируются через `/admin-shot-types`) поверх код-дефолтов. Тексты-оверрайды влияют только на UI — Stage 2 prompt всегда берёт код-дефолты.

        **Frontend pattern:** кешируй умеренно (CDN 5 мин + клиентский кеш с TTL ~1ч / stale-while-revalidate). НЕ кешируй на всё время жизни app version — контент меняется из админки.
      security: []
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            enum: [en, ru]
            default: en
          description: |
            Локаль для `label` и `description`. Unsupported value (e.g. `hy`) → fallback на `en` + `fallback_used: true` в response.
      responses:
        '200':
          description: Каталог shot types
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                type: object
                properties:
                  shot_types:
                    type: object
                    description: 'Category slug → массив `{slug, label, description, image_url}` для этой категории (4 типа в каждой)'
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          slug:
                            type: string
                          label:
                            type: string
                          description:
                            type: string
                          image_url:
                            type: string
                            format: uri
                            nullable: true
                            description: 'Public CDN URL картинки shot type, или null. Задаётся через /admin-shot-types. (2026-06-07)'
                  categories:
                    type: object
                    description: 'Category slug → human-name на выбранной локали ("Одежда и обувь" / "Clothing & Footwear")'
                    additionalProperties:
                      type: string
                  locale:
                    type: string
                    enum: [en, ru]
                  fallback_used:
                    type: boolean
                    description: '`true` если `?locale=` был unsupported → fallback на `en`'

  /functions/v1/admin-gems:
    get:
      tags: [Admin]
      summary: Список всех камней (superadmin only)
      description: |
        CRUD каталога камней (`gems`) и их операций (`gem_operations`). **Доступ: только `superadmin`** (`requireSuperadmin`). Мутации → `admin_audit_log` (`gem.*`). GET возвращает все камни (вкл. неактивные), у каждого поле `operations` (полные строки `gem_operations` с `engines`+`note`). `display_name`/`description` приходят как объекты `{en,ru,hy}` (в отличие от публичного `/gems`, где строка). **2026-07-11:** цены/движки сняты с камня → операции (`PUT/DELETE /admin-gems/{id}/operations/{op}`).
      responses:
        '200':
          description: 'Все камни (обёртка `{ gems, total }`, НЕ голый массив)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  gems: { type: array, items: { $ref: '#/components/schemas/Gem' } }
                  total: { type: integer }
        '401': { description: Нет/невалидный JWT }
        '403': { description: Не superadmin }
    post:
      tags: [Admin]
      summary: Создать камень (superadmin only)
      description: 'Required: `code`, `gen_content_type_id` (только метаданные камня). `is_default=true` авто-снимает default с других камней того же типа. Цены/движки задаются отдельно через операции. **`new_until` (2026-07-18):** если поле НЕ передать — авто `now()+30д` (новый камень месяц с бейджем «new»); передать `null` — создать без «new».'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/GemWritable'
                - { type: object, required: [code, gen_content_type_id] }
      responses:
        '201':
          description: Камень создан
          content:
            application/json:
              schema: { type: object, properties: { gem: { $ref: '#/components/schemas/Gem' } } }
        '400': { description: Bad body / неизвестный engine_id / gen_content_type_id не найден / невалидный version/new_until/badges }
        '401': { description: Нет/невалидный JWT }
        '403': { description: Не superadmin }
        '409': { description: 'Дубль code ("…code already exists") ИЛИ дубль version в этом content type ("…already uses that version") — различай по тексту error' }
  /functions/v1/admin-gems/{id}:
    patch:
      tags: [Admin]
      summary: Обновить камень (superadmin only)
      description: 'Любой subset полей. `is_default=true` авто-снимает default у других камней типа.'
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GemWritable' }
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema: { type: object, properties: { gem: { $ref: '#/components/schemas/Gem' } } }
        '400': { description: Bad body / неизвестный engine_id / невалидный version/new_until/badges }
        '403': { description: Не superadmin }
        '404': { description: Камень не найден }
        '409': { description: 'Дубль code ("…code already exists") ИЛИ дубль version в этом content type ("…already uses that version") — различай по тексту error' }
    delete:
      tags: [Admin]
      summary: Удалить камень (superadmin only)
      description: 'FK `generations.gem_id` = ON DELETE SET NULL — исторические генерации выживают.'
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Удалено
          content:
            application/json:
              schema: { type: object, properties: { deleted: { type: boolean }, id: { type: string, format: uuid } } }
        '403': { description: Не superadmin }
        '404': { description: Камень не найден }

  /functions/v1/admin-gems/{id}/operations/{op}:
    put:
      tags: [Admin]
      summary: Upsert операции камня (superadmin only)
      description: 'Создать/обновить одну операцию камня (`gem_operations`): цена + тайминг + движки. Каждый `engine_id` валидируется против `ai_engines` (2026-07-11).'
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: op, required: true, schema: { type: string, pattern: '^[a-z][a-z0-9-]*$' }, description: 'kebab-case op из реестра operations: image-generate | image-improve | product-analyze | environment-analyze | card-generate | card-copywriting | card-improve' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GemOperationWritable' }
      responses:
        '200':
          description: Операция сохранена
          content:
            application/json:
              schema: { type: object, properties: { operation: { type: object } } }
        '400': { description: Bad body / неизвестный engine_id / плохой op / не-UUID id }
        '403': { description: Не superadmin }
        '404': { description: Камень не найден }
    delete:
      tags: [Admin]
      summary: Удалить операцию камня (superadmin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: op, required: true, schema: { type: string } }
      responses:
        '200':
          description: Удалено
          content:
            application/json:
              schema: { type: object, properties: { deleted: { type: boolean }, gem_id: { type: string, format: uuid }, op: { type: string } } }
        '403': { description: Не superadmin }
        '404': { description: Камень не найден }

  /functions/v1/admin-gems/{id}/paid-options/{code}:
    put:
      tags: [Admin]
      summary: Привязать/задать цену платной опции на камне (superadmin only)
      description: 'Привязать платную опцию («Платная опция») к камню и задать её цену В КРЕДИТАХ для этого камня (`gem_paid_options`, upsert). Опция должна существовать в каталоге (`/admin-paid-options`). Цена отдаётся клиенту в `GET /gems`. Audit `gem.paid_option_upsert`. (2026-07-14)'
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: code, required: true, schema: { type: string, pattern: '^[a-z][a-z0-9_]*$' }, description: 'например environment' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [credit_price], properties: { credit_price: { type: integer, minimum: 0, example: 1 } } }
      responses:
        '200': { description: Привязано }
        '400': { description: Bad body / неизвестная платная опция (нет в каталоге) / не-UUID id }
        '403': { description: Не superadmin }
        '404': { description: Камень не найден }
    delete:
      tags: [Admin]
      summary: Отвязать платную опцию от камня (superadmin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: code, required: true, schema: { type: string } }
      responses:
        '200': { description: Отвязано }
        '403': { description: Не superadmin }
        '404': { description: Камень не найден }

  /functions/v1/admin-paid-options:
    get:
      tags: [Admin]
      summary: Каталог платных опций (superadmin only)
      description: |
        CRUD каталога **платных опций** («Платные опции») — опциональных платных фич, которые юзер добавляет к генерации (`environment`/ФО сейчас; `design_reference`/ДР позже). Каталог = только ОПРЕДЕЛЕНИЕ (`code`, `label`, `note`); цена задаётся ПО КАМНЮ через `PUT /admin-gems/{id}/paid-options/{code}`. **Доступ: только `superadmin`**. Audit `paid_option.*`. (2026-07-14)
      responses:
        '200':
          description: Каталог
          content:
            application/json:
              schema:
                type: object
                properties:
                  paid_options:
                    type: array
                    items:
                      type: object
                      properties:
                        code: { type: string, example: environment }
                        label: { type: object, description: '{en,ru}' }
                        note: { type: string, nullable: true }
                        is_active: { type: boolean }
                        gem_count: { type: integer, description: 'к скольким камням привязана (для guard удаления)' }
                  total: { type: integer }
        '403': { description: Не superadmin }
    post:
      tags: [Admin]
      summary: Создать платную опцию (superadmin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, label]
              properties:
                code: { type: string, pattern: '^[a-z][a-z0-9_]*$', example: design_reference }
                label: { type: object, description: '{en,ru}' }
                note: { type: string, nullable: true }
      responses:
        '201': { description: Создано }
        '400': { description: Bad code/label }
        '403': { description: Не superadmin }
        '409': { description: Опция с таким code уже есть }

  /functions/v1/admin-paid-options/{code}:
    patch:
      tags: [Admin]
      summary: Обновить платную опцию (superadmin only)
      parameters:
        - { in: path, name: code, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { label: { type: object }, note: { type: string, nullable: true }, is_active: { type: boolean } } }
      responses:
        '200': { description: Обновлено }
        '400': { description: Нет валидных полей }
        '403': { description: Не superadmin }
        '404': { description: Не найдено }
    delete:
      tags: [Admin]
      summary: Удалить платную опцию (superadmin only)
      description: 'Запрещено (409), пока опция привязана хотя бы к одному камню — сначала отвяжи её от всех камней.'
      parameters:
        - { in: path, name: code, required: true, schema: { type: string } }
      responses:
        '200': { description: Удалено }
        '403': { description: Не superadmin }
        '404': { description: Не найдено }
        '409': { description: 'Опция привязана к N камням (`{error, gem_count}`)' }

  /functions/v1/admin-ai-engines:
    get:
      tags: [Admin]
      summary: Список всех движков (superadmin only)
      description: |
        CRUD **скрытых** вендорских движков (`ai_engines`). **Доступ: только `superadmin`**. Audit `engine.*`. Ключи вендоров тут НЕ хранятся — `api_key_name` это имя Edge-секрета (`Deno.env`).
      responses:
        '200':
          description: 'Массив движков. Каждый движок аннотирован `used_by_gems` (int) + `referenced_by` (коды камней) — для UI "Used by N gems".'
          content:
            application/json:
              schema:
                type: object
                properties:
                  engines: { type: array, items: { $ref: '#/components/schemas/AiEngine' } }
                  total: { type: integer }
        '401': { description: Нет/невалидный JWT }
        '403': { description: Не superadmin }
    post:
      tags: [Admin]
      summary: Создать движок (superadmin only)
      description: 'Required: `display_name`, `vendor`, `provider_model`.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AiEngineWritable'
                - { type: object, required: [display_name, vendor, provider_model] }
      responses:
        '201':
          description: Движок создан
          content:
            application/json:
              schema: { type: object, properties: { engine: { $ref: '#/components/schemas/AiEngine' } } }
        '400': { description: Bad body }
        '403': { description: Не superadmin }
  /functions/v1/admin-ai-engines/{id}:
    patch:
      tags: [Admin]
      summary: Обновить движок (superadmin only)
      description: 'Любой subset полей.'
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiEngineWritable' }
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema: { type: object, properties: { engine: { $ref: '#/components/schemas/AiEngine' } } }
        '400': { description: Bad body }
        '403': { description: Не superadmin }
        '404': { description: Движок не найден }
    delete:
      tags: [Admin]
      summary: Удалить движок (superadmin only)
      description: 'Блокируется **409** если на движок ссылается камень (`referenced_by: [code,…]`) — сначала отвяжи. Историч. `generations.engine_id` = SET NULL.'
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Удалено
          content:
            application/json:
              schema: { type: object, properties: { deleted: { type: boolean }, id: { type: string, format: uuid } } }
        '403': { description: Не superadmin }
        '404': { description: Движок не найден }
        '409':
          description: Движок используется камнями
          content:
            application/json:
              schema: { type: object, properties: { error: { type: string }, referenced_by: { type: array, items: { type: string } } } }

  /functions/v1/admin-shot-types:
    get:
      tags: [Admin]
      summary: Все shot types — дефолты + UI-оверрайды (superadmin only)
      description: |
        Редактор UI-надстройки shot types: локализованные title/description + картинка. Промпт-движок остаётся в коде и здесь НЕ редактируется (генерация не затрагивается). **Доступ: только `superadmin`** (`requireSuperadmin`). Мутации → `admin_audit_log` (`shot_type.*`).

        GET возвращает все 28 shot types: код-дефолты + текущий оверрайд + image_url.
      responses:
        '200':
          description: Все shot types
          content:
            application/json:
              schema:
                type: object
                properties:
                  shot_types:
                    type: array
                    items:
                      type: object
                      properties:
                        category: { type: string }
                        slug: { type: string }
                        default:
                          type: object
                          description: 'Код-дефолт { label:{en,ru}, description:{en,ru} }'
                        override:
                          type: object
                          nullable: true
                          description: '{ title_en, title_ru, description_en, description_ru } или null'
                        image_path: { type: string, nullable: true }
                        image_url: { type: string, format: uri, nullable: true }
                  total: { type: integer }
        '401': { description: Нет/невалидный JWT }
        '403': { description: Не superadmin }

  /functions/v1/admin-shot-types/{category}/{slug}:
    patch:
      tags: [Admin]
      summary: Задать/очистить оверрайд title/description (superadmin only)
      parameters:
        - { in: path, name: category, required: true, schema: { type: string } }
        - { in: path, name: slug, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 'Любой subset; значение null = очистить поле.'
              properties:
                title_en: { type: string, nullable: true }
                title_ru: { type: string, nullable: true }
                description_en: { type: string, nullable: true }
                description_ru: { type: string, nullable: true }
      responses:
        '200': { description: Обновлённый оверрайд }
        '400': { description: Нет полей / неверный тип }
        '403': { description: Не superadmin }
        '404': { description: Неизвестный category/slug }
    delete:
      tags: [Admin]
      summary: Сброс shot type к код-дефолтам (superadmin only)
      description: 'Удаляет весь оверрайд + картинку.'
      parameters:
        - { in: path, name: category, required: true, schema: { type: string } }
        - { in: path, name: slug, required: true, schema: { type: string } }
      responses:
        '200': { description: Сброшено }
        '403': { description: Не superadmin }
        '404': { description: Неизвестный category/slug }

  /functions/v1/admin-shot-types/{category}/{slug}/image:
    post:
      tags: [Admin]
      summary: Загрузить картинку shot type (superadmin only)
      parameters:
        - { in: path, name: category, required: true, schema: { type: string } }
        - { in: path, name: slug, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 'image/jpeg | image/png | image/webp, ≤ 5 MiB'
      responses:
        '200': { description: Обновлённый row }
        '400': { description: Неверный тип/размер файла }
        '403': { description: Не superadmin }
        '404': { description: Неизвестный category/slug }
    delete:
      tags: [Admin]
      summary: Убрать картинку shot type (superadmin only)
      parameters:
        - { in: path, name: category, required: true, schema: { type: string } }
        - { in: path, name: slug, required: true, schema: { type: string } }
      responses:
        '200': { description: Картинка убрана }
        '403': { description: Не superadmin }
        '404': { description: Неизвестный category/slug }

  /functions/v1/faq:
    get:
      tags: [AI Pipeline]
      summary: Marketing FAQ items (public, i18n)
      description: |
        Публичный read-only endpoint — список marketing FAQ items для runpik.com/faq + Flutter app FAQ screen.

        **No auth required** — `verify_jwt = false`. Cache `public, max-age=300` (5 min edge CDN — FAQ rarely changes).

        Same pattern как `/shot-types`: locale-aware с per-item fallback. Если у item NULL для requested locale, возвращается `en` для этого item (остальные items получают свою локаль если присутствует).

        Server filters `is_enabled = true` через RLS + sorts by `sort_order ASC, created_at ASC`. Answer field может содержать Markdown (`**bold**`, `[link](url)`) — frontend должен render.

        **Frontend pattern:** кеш можно агрессивно (5 min CDN + клиентский localStorage). Pull-to-refresh re-fetches при необходимости.
      security: []
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            enum: [en, ru]
            default: en
          description: |
            Локаль для `question` + `answer`. Unsupported value → fallback на `en` с `fallback_used: true`.
      responses:
        '200':
          description: Массив enabled FAQ items
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                type: object
                properties:
                  faqs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        slug:
                          type: string
                          description: 'URL-friendly identifier для deep-linking (e.g. `runpik.com/faq#marketplaces`)'
                          example: marketplaces
                        question:
                          type: string
                          description: 'Локализованный вопрос (resolved для выбранной локали с en fallback per item)'
                        answer:
                          type: string
                          description: 'Локализованный ответ. Может содержать Markdown — `**bold**`, `[link](url)`.'
                        category:
                          type: string
                          nullable: true
                          description: 'Optional group (NULL для MVP)'
                        sort_order:
                          type: integer
                          description: 'Admin-controlled order'
                  locale:
                    type: string
                    enum: [en, ru]
                  fallback_used:
                    type: boolean
                  total:
                    type: integer

  # ============================================================
  # CARD (Карточка)
  # ============================================================

  /functions/v1/card-copywriting:
    post:
      tags: [Generation]
      summary: Копирайтер карточки (CARD) — текст + дизайн-бриф
      description: |
        Копирайтер контент-тайпа **КАРТОЧКА** — кнопка «AI идея» (по нажатию, не автопрефилл). Превращает анализ товара (+ опц. свободную заметку «О чём рассказать») в **структурный бриф** (headline/subheadline/features + дизайн) И короткий plain-text **`suggestion`** для поля. `verify_jwt=true`. **Бесплатно, только читает** (без записи в БД, без кэша; прошлые варианты → `exclude`, высокая температура). `user_note` — сигнал намерения (verbatim-lock при явном требовании). Язык = язык `user_note` (пусто → `locale`). Тот же копирайтер вызывается ВНУТРИ `/card-generate` на генерации (тюнинг). Движок — операция `card-copywriting` CARD-камня (amber, text `gemini-2.5-flash`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [analysis_id]
              properties:
                analysis_id: { type: string, format: uuid, description: 'Товар (проверяется владелец).' }
                user_note: { type: string, description: 'Ответ «О чём рассказать» (опц.; пусто = idea с нуля).' }
                exclude: { type: array, items: { type: string }, description: 'Прошлые варианты, от которых уйти («AI идея»).' }
                locale: { type: string, example: ru, description: 'Фолбэк-язык, если user_note пуст (default ru).' }
      responses:
        '200':
          description: Бриф карточки
          content:
            application/json:
              schema:
                type: object
                properties:
                  brief:
                    type: object
                    properties:
                      language: { type: string, example: ru }
                      copy:
                        type: object
                        properties:
                          eyebrow: { type: string, nullable: true }
                          headline: { type: string }
                          subheadline: { type: string, nullable: true }
                          features:
                            type: array
                            items:
                              type: object
                              properties:
                                label: { type: string }
                                detail: { type: string }
                                icon_hint: { type: string }
                          badge: { type: object, nullable: true }
                          footer_tagline: { type: string, nullable: true }
                      design:
                        type: object
                        properties:
                          font_personality: { type: string }
                          palette: { type: string }
                          mood: { type: string }
                          layout_hint: { type: string }
                      meta:
                        type: object
                        properties:
                          emphasis: { type: string }
                          locked_texts: { type: array, items: { type: string } }
                  suggestion:
                    type: string
                    description: 'Короткий plain-text (строки через \n) для поля «О чём рассказать». Клиент кладёт в поле именно это, не brief.'
                    example: "Элегантный фиолетовый цвет\nМногоярусная юбка\nТонкие бретели"
        '400': { description: Битый JSON / нет analysis_id }
        '401': { description: Нет/невалидный JWT }
        '403': { description: Анализ принадлежит другому юзеру }
        '404': { description: analysis_id не найден }
        '502': { description: Gemini ошибка / пустой / невалидный JSON }

  /functions/v1/card-generate:
    post:
      tags: [Generation]
      summary: Генерация картинки карточки (CARD, Вариант A)
      description: |
        Рендер картинки карточки (content type CARD, **Вариант A** — текст запекается в изображение; идентичность товара сохраняется). Близнец `/image-generate` с текстовым слоем. `verify_jwt=true`. **Стоимость = операция `card-generate` CARD-камня (amber = 5), charge-on-success** (при сбое кредиты не списываются). Пишет строку в `generations` с `content_type='CARD'` + `card_brief`. Текст берётся из `user_note` — на генерации прогоняется копирайтер (тюнинг; пусто → придумывает) → бриф → рендер; либо клиент шлёт готовый `brief` (если поле не менялось после «AI идея»). Презентация товара — из `shot_type`; цвета текста динамические. Mock (`RUNPIK_MOCK_GENERATION`) поддержан.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [analysis_id]
              properties:
                analysis_id: { type: string, format: uuid, description: 'Товар (переиспользует продуктовый /analyze).' }
                user_note: { type: string, description: 'Текст поля «О чём рассказать» (пусто → копирайтер придумывает).' }
                brief: { type: object, description: 'Готовый бриф (пропускает копирайтер) — слать, когда поле не менялось после «AI идея».' }
                shot_type: { type: string, description: 'Ракурс (презентация товара).' }
                lighting: { type: string, enum: [daylight, studio, sunset, rim] }
                aspect_ratio: { type: string, enum: ['16:9', '4:3', '1:1', '3:4', '9:16'], default: '3:4' }
                locale: { type: string, example: ru, description: 'Фолбэк-язык копирайтера, если user_note пуст.' }
                gem_id: { type: string, format: uuid, description: 'Не передавать — берётся дефолтный CARD-камень (amber).' }
                project_id: { type: string, format: uuid }
                product_name: { type: string }
      responses:
        '200':
          description: Карточка сгенерирована
          content:
            application/json:
              schema:
                type: object
                properties:
                  generation_id: { type: string, format: uuid }
                  analysis_id: { type: string, format: uuid }
                  content_type: { type: string, example: CARD }
                  output_url: { type: string, description: 'Постоянный public CDN URL (не истекает).' }
                  output_path: { type: string }
                  expires_in_seconds: { type: integer, example: 2592000 }
                  warnings: { type: array, items: { type: string } }
                  credits_remaining: { type: integer }
                  mock: { type: boolean, description: 'Только при RUNPIK_MOCK_GENERATION.' }
        '400': { description: Битый JSON / нет analysis_id / ошибка сборки промпта }
        '401': { description: Нет/невалидный JWT }
        '402': { description: 'Недостаточно кредитов (card-generate; amber=5). Body {error, balance, required}.' }
        '403': { description: Анализ принадлежит другому юзеру }
        '404': { description: analysis_id не найден / входное фото пропало }
        '422': { description: 'verdict recheck (is_suitable.verdict=false). Body {error, blockers, analysis_id}.' }
        '500': { description: env vars / DB / upload }
        '502': { description: Gemini (копирайтер или image) }

  /functions/v1/card-improve:
    post:
      tags: [Generation]
      summary: Улучшить карточку (CARD, Вариант A, новая версия)
      description: |
        Улучшение карточки (content type CARD, **Вариант A** — image-to-image правка существующей карточки: юзер видит готовую карточку и пишет, что поменять). Правка **точечная** — сохраняет товар, **весь текст** и дизайн, применяет только запрошенное (в отличие от фото-`/image-improve`, который текст стирает). Близнец `/image-improve`: переиспользует скелет версий (`root_generation_id`/`version_index`) + charge-on-success. `verify_jwt=true`.

        **Источник обязан быть CARD** (иначе 400 `code: NOT_A_CARD`). **Стоимость = операция `card-improve` CARD-камня (amber = 3), charge-on-success** — камень наследуется от исходной версии (`source.gem_id`, fallback — дефолтный CARD). Создаётся **новая версия** в той же группе; при сбое Gemini строка версии удаляется (кредиты не списаны).

        **Mock:** при `RUNPIK_MOCK_GENERATION=true` копирует исходную карточку как новую версию, response содержит `mock: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [generation_id, improvement_prompt]
              properties:
                generation_id:
                  type: string
                  format: uuid
                  description: Существующая CARD-генерация (любая версия группы). Должна быть `done`, с output'ом, принадлежать caller'у.
                improvement_prompt:
                  type: string
                  minLength: 1
                  maxLength: 300
                  description: Что поменять. Проходит sanitizeUserText перед Gemini.
                  example: сделай заголовок крупнее
                idempotency_key:
                  type: string
                  format: uuid
                  description: Повтор с тем же ключом → replay существующей версии (без повторного списания).
                gem_id:
                  type: string
                  format: uuid
                  description: >-
                    Камень для этого improve (2026-07-19). Если задан — должен быть активным CARD-камнем
                    (чужой тип → 400 "Model is not for CARD content") и поддерживать card-improve
                    (иначе → 400 "This gem does not support improve"). Не задан → наследуется камень источника
                    (legacy NULL → дефолтный CARD). Цена — из выбранного камня; версии группы могут быть на
                    разных CARD-камнях. Пишется в generations.gem_id.
      responses:
        '200':
          description: Новая версия карточки создана (или idempotent replay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  generation_id: { type: string, format: uuid, description: НОВАЯ версия }
                  root_generation_id: { type: string, format: uuid }
                  version_index: { type: integer, example: 1 }
                  source_generation_id: { type: string, format: uuid }
                  improvement_prompt: { type: string }
                  content_type: { type: string, example: CARD }
                  output_url: { type: string, description: 'Постоянный public CDN URL (не истекает).' }
                  output_path: { type: string }
                  expires_in_seconds: { type: integer, example: 2592000 }
                  status: { type: string, example: done }
                  credits_remaining: { type: integer }
                  idempotent_replay: { type: boolean, description: present только при idempotency replay }
                  mock: { type: boolean, description: 'Только при RUNPIK_MOCK_GENERATION.' }
        '400': { description: 'Битый JSON / нет generation_id / пустой или >300 промпт (`code: PROMPT_EMPTY` / `PROMPT_TOO_LONG`) / источник не CARD (`code: NOT_A_CARD`, для фото → /improve-generation) / невалидный gem_id: не UUID / не CARD-камень ("Model is not for CARD content") / камень без card-improve ("This gem does not support improve")' }
        '401': { description: Нет/невалидный JWT }
        '402': { description: 'Недостаточно кредитов (`code: INSUFFICIENT_CREDITS`; card_improve, amber=3)' }
        '403': { description: Генерация принадлежит другому юзеру }
        '404': { description: generation_id не найден }
        '409': { description: 'Source не готов (`code: SOURCE_NOT_READY`) или лимит версий (`code: VERSION_LIMIT_REACHED`)' }
        '500': { description: env vars / DB / upload }
        '502': { description: 'Image-to-image сбой (`code: GEMINI_FAILURE`). Строка версии удалена, кредиты НЕ списаны.' }

  # ============================================================
  # INSPIRE / STYLES
  # ============================================================

  /functions/v1/gems:
    get:
      tags: [AI Pipeline]
      summary: Каталог моделей-«камней» (public, i18n)
      description: |
        Публичный read-only каталог наших брендовых AI-моделей («камней», `gems`) для экрана выбора модели. Юзер видит камни Runpik (Quartz, …) — **никогда вендорские движки**.

        **No auth required** — `verify_jwt = false`. Cache `public, max-age=300` (5 min edge CDN).

        **Вендорские движки НИКОГДА не возвращаются** (внутреннее, как `style_prompt`) — они привязаны к операциям камня. Возвращаются только опубликованные камни активных типов (сейчас `IMAGE` + `CARD`; `VIDEO` выключен). Цена операции = её `credit_price` в кредитах (см. `operations`).

        **Frontend:** фильтруй `gems` по `content_type` (`IMAGE` и `CARD`), предвыбирай `is_default`. Пока по одному камню на тип → `gem_id` не передавай (берётся дефолтный камень типа); при нескольких камнях появится пикер. Цена = нужная операция из `operations` (напр. `image-generate` для фото, `card-generate` для карточки).
      security: []
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            enum: [en, ru]
            default: en
          description: 'Локаль для `display_name` + `description`. Unsupported (вкл. hy) → fallback на `en` с `fallback_used: true`.'
      responses:
        '200':
          description: Каталог активных камней
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                type: object
                properties:
                  gems:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        code: { type: string, example: quartz }
                        display_name: { type: string, example: Quartz }
                        description: { type: string }
                        content_type: { type: string, example: IMAGE }
                        version:
                          type: number
                          example: 2.0
                          description: 'Юзер-версия камня (2026-07-18). Больше = новее/сильнее. Уникальна ВНУТРИ content type (Sapphire 2.0/IMAGE и Ruby 2.0/CARD сосуществуют — разные пикеры). Порядок списка задаёт sort_order, НЕ version. Клиент рисует «v2.0».'
                        badges:
                          type: array
                          description: 'Бейджи камня (2026-07-18), локализованные. Первым идёт авто-`new` (пока активно внутреннее окно new_until; авто-истекает без крона), затем курируемые (popular/pro/…). Рендерь массив generically. Пусто = бейджей нет.'
                          items:
                            type: object
                            properties:
                              code: { type: string, example: new, description: 'new (авто) | curated codes' }
                              label: { type: string, example: 'Новинка' }
                              tone: { type: string, nullable: true, example: accent, description: 'UI-подсказка стиля (accent для new, произвольная для курируемых) или null' }
                        operations:
                          type: array
                          description: 'Цена + тайминг ПО ОПЕРАЦИИ (kebab-коды с 2026-07-14). Движки/note вырезаны. Стоимость генерации = базовая операция + сумма подключённых платных опций (paid_options). Анализ (product-analyze/environment-analyze) НЕ здесь — он на внутреннем камне-анализаторе (тип ANALYZE, скрыт).'
                          items:
                            type: object
                            properties:
                              op: { type: string, example: image-generate, description: 'image-generate | image-improve | card-generate | card-copywriting | card-improve (kebab-case, из реестра operations)' }
                              credit_price: { type: integer, example: 4 }
                              charge_timing: { type: string, nullable: true, example: on_generate, description: 'on_generate | on_create | on_request | null (free)' }
                        paid_options:
                          type: array
                          description: 'Платные опции («Платные опции»), подключённые к камню, с ценой ЗА ЭТОТ КАМЕНЬ (2026-07-14). Опциональные платные фичи, которые юзер добавляет к генерации: сейчас `environment` (ФО, +1), позже `design_reference` (ДР). Клиент рисует «+N кредитов» рядом с фичей из этих данных. Итог = базовая операция + Σ выбранных платных опций.'
                          items:
                            type: object
                            properties:
                              code: { type: string, example: environment }
                              label: { type: string, example: 'Фото окружения (ФО)' }
                              credit_price: { type: integer, example: 1 }
                        is_default: { type: boolean }
                        sort_order: { type: integer }
                  content_types:
                    type: object
                    additionalProperties: { type: string }
                    description: 'Локализованные label типов, у которых есть ≥1 камень. Камни — по content type (Quartz=IMAGE, amber=CARD), поэтому теперь `{ "IMAGE": "…", "CARD": "…" }`. Цена карточки = операция card-generate CARD-камня. Пока один камень на тип → gem_id не слать (берётся дефолтный).'
                  locale: { type: string }
                  fallback_used: { type: boolean }
                  total: { type: integer }
        '405':
          description: метод != GET/OPTIONS
        '500':
          description: missing env vars / DB error

  /functions/v1/styles:
    get:
      tags: [Inspire]
      summary: Каталог опубликованных стилей (public, i18n)
      description: |
        Публичный read-only каталог **опубликованных** стилей для таба Inspire. Возвращает локализованные title/description + public CDN URL на before/after картинки.

        **No auth required** — `verify_jwt = false`. Cache `public, max-age=300` (5 min edge CDN).

        **`style_prompt` НИКОГДА не возвращается** (это IP). Query `WHERE is_published = true ORDER BY sort_order ASC, created_at DESC` (порядок задаётся админом через `POST /admin-styles/reorder`). Пустой `[]` пока founder не добавил стилей.

        **Frontend:** при выборе стиля передавай `styles[i].id` как `style_id` в `/image-generate`. Если `excluded_categories` содержит категорию текущего продукта — задизейбль стиль (backend тоже отвергнет, 400).
      security: []
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            enum: [en, ru]
            default: en
          description: 'Локаль для `title` + `description`. Unsupported → fallback на `en` с `fallback_used: true`.'
      responses:
        '200':
          description: Массив опубликованных стилей
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                type: object
                properties:
                  styles:
                    type: array
                    items:
                      $ref: '#/components/schemas/StylePublic'
                  locale:
                    type: string
                    enum: [en, ru]
                  fallback_used:
                    type: boolean
                  total:
                    type: integer
        '500':
          description: DB query failure

  /functions/v1/admin-styles:
    get:
      tags: [Inspire]
      summary: Список всех стилей (style managers only)
      description: |
        Возвращает **все** стили (любой publish-статус), `created_at DESC`, включая `style_prompt` и пути картинок.

        **Auth:** роль `curator`, `admin` или `superadmin` (`requireStyleManager`). Иначе 403.

        `/admin-styles` — единая функция с routing по method+sub-path (как `/admin`). Каждая мутация пишет `admin_audit_log` (`action = style.*`).
      responses:
        '200':
          description: Все стили
          content:
            application/json:
              schema:
                type: object
                properties:
                  styles:
                    type: array
                    items:
                      $ref: '#/components/schemas/StyleAdmin'
                  total:
                    type: integer
        '401':
          description: Нет/невалидный JWT
        '403':
          description: Роль не curator/admin/superadmin
    post:
      tags: [Inspire]
      summary: Создать стиль (без картинок, unpublished)
      description: |
        Создаёт стиль с `is_published=false`, `created_by=auth.uid()`, без картинок. Картинки грузятся отдельно (`POST /admin-styles/{id}/image`), затем publish.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, title_en, title_ru, description_en, description_ru, style_prompt]
              properties:
                slug:
                  type: string
                  pattern: '^[a-z][a-z0-9_]*$'
                  example: apothecary_sand
                title_en: { type: string }
                title_ru: { type: string }
                description_en: { type: string }
                description_ru: { type: string }
                style_prompt:
                  type: string
                  description: 'English-only style overlay prose. Backend-only, никогда не отдаётся публично.'
                excluded_categories:
                  type: array
                  items:
                    $ref: '#/components/schemas/ProductCategory'
                  description: 'Категории, с которыми стиль несовместим. Default `[]`.'
      responses:
        '201':
          description: Стиль создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  style:
                    $ref: '#/components/schemas/StyleAdmin'
        '400':
          description: Невалидный body / slug формат / неизвестная категория
        '403':
          description: Роль не style manager
        '409':
          description: Slug уже существует

  /functions/v1/admin-styles/reorder:
    post:
      tags: [Inspire]
      summary: Переупорядочить каталог стилей
      description: |
        Массив `ids` — новый порядок сверху вниз (под drag-and-drop фронт шлёт полный упорядоченный список). Бэкенд перезаписывает `sort_order = (позиция+1)*10`. Возвращает обновлённый список. Аудит `style.reorder`.

        Порядок каталога везде: `sort_order ASC, created_at DESC`. Новые стили (`sort_order=0`) всплывают наверх до расстановки.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
                  description: 'Новый порядок (top→bottom). Непустой, без дублей.'
      responses:
        '200':
          description: Обновлённый упорядоченный список
          content:
            application/json:
              schema:
                type: object
                properties:
                  styles:
                    type: array
                    items:
                      $ref: '#/components/schemas/StyleAdmin'
                  total:
                    type: integer
        '400':
          description: Пустой массив / не-UUID / дубли в ids
        '403':
          description: Роль не style manager

  /functions/v1/admin-styles/{id}:
    patch:
      tags: [Inspire]
      summary: Обновить метаданные стиля
      description: 'Обновляет любой subset метаданных. Нельзя менять `is_published` (отдельные publish/unpublish routes) или пути картинок (image upload route).'
      parameters:
        - $ref: '#/components/parameters/StyleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                slug: { type: string, pattern: '^[a-z][a-z0-9_]*$' }
                title_en: { type: string }
                title_ru: { type: string }
                description_en: { type: string }
                description_ru: { type: string }
                style_prompt: { type: string }
                excluded_categories:
                  type: array
                  items:
                    $ref: '#/components/schemas/ProductCategory'
      responses:
        '200':
          description: Обновлённый стиль
          content:
            application/json:
              schema:
                type: object
                properties:
                  style:
                    $ref: '#/components/schemas/StyleAdmin'
        '400':
          description: Невалидный body / нет полей для update / `id` не UUID
        '403':
          description: Роль не style manager
        '404':
          description: Стиль не найден
        '409':
          description: Slug уже существует
    delete:
      tags: [Inspire]
      summary: Удалить стиль
      description: 'Удаляет строку (FK `generations.style_id` → SET NULL, исторические генерации переживают) + best-effort удаление blob-ов под `{id}/`.'
      parameters:
        - $ref: '#/components/parameters/StyleId'
      responses:
        '200':
          description: Удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                  id: { type: string, format: uuid }
        '403':
          description: Роль не style manager
        '404':
          description: Стиль не найден

  /functions/v1/admin-styles/{id}/image:
    post:
      tags: [Inspire]
      summary: Загрузить before/after картинку (multipart)
      description: |
        Грузит картинку в `style-references/{id}/{kind}.{ext}` (старые ext-варианты этого kind удаляются), обновляет `before_image_path`/`after_image_path`.
      parameters:
        - $ref: '#/components/parameters/StyleId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [kind, file]
              properties:
                kind:
                  type: string
                  enum: [before, after]
                file:
                  type: string
                  format: binary
                  description: 'image/jpeg | image/png | image/webp, ≤ 5 MiB'
      responses:
        '200':
          description: Обновлённый стиль
          content:
            application/json:
              schema:
                type: object
                properties:
                  style:
                    $ref: '#/components/schemas/StyleAdmin'
        '400':
          description: Невалидный kind / тип файла / размер > 5 MiB / не multipart
        '403':
          description: Роль не style manager
        '404':
          description: Стиль не найден

  /functions/v1/admin-styles/{id}/publish:
    post:
      tags: [Inspire]
      summary: Опубликовать стиль
      description: 'Требует обе картинки (before + after). Иначе 422. БД-CHECK `styles_published_requires_images` — backstop.'
      parameters:
        - $ref: '#/components/parameters/StyleId'
      responses:
        '200':
          description: Опубликован
          content:
            application/json:
              schema:
                type: object
                properties:
                  style:
                    $ref: '#/components/schemas/StyleAdmin'
        '403':
          description: Роль не style manager
        '404':
          description: Стиль не найден
        '422':
          description: 'Нет одной/обеих картинок — `{ error, missing: ["before"|"after"] }`'

  /functions/v1/admin-styles/{id}/unpublish:
    post:
      tags: [Inspire]
      summary: Снять стиль с публикации
      description: 'Ставит `is_published=false`. Всегда разрешено.'
      parameters:
        - $ref: '#/components/parameters/StyleId'
      responses:
        '200':
          description: Снят с публикации
          content:
            application/json:
              schema:
                type: object
                properties:
                  style:
                    $ref: '#/components/schemas/StyleAdmin'
        '403':
          description: Роль не style manager
        '404':
          description: Стиль не найден

  # ============================================================
  # ADMIN
  # ============================================================

  /functions/v1/admin:
    get:
      tags: [Admin]
      summary: Index доступных admin endpoints
      description: |
        Возвращает список всех admin endpoints + текущую phase (1 = read-only).

        **Auth requirement:** `profiles.role = 'superadmin'`. Не-superadmin → 403.

        Phase 2+ добавит mutating endpoints (set_role, grant_credits, force_delete) которые будут писать в `admin_audit_log`.
      responses:
        '200':
          description: Index admin endpoints
          content:
            application/json:
              schema:
                type: object
                properties:
                  available_endpoints:
                    type: array
                    items:
                      type: string
                  phase:
                    type: string
                    example: '1 (read-only config inspection)'
                  notes:
                    type: string
        '403':
          description: 'Forbidden — `profiles.role != ''superadmin''`'

  /functions/v1/admin/prompts/analyze:
    get:
      tags: [Admin]
      summary: Stage 1 prompt + model + version
      description: 'Returns текущий `STAGE_1_PROMPT` (вся ~70 строк), name модели Gemini, prompt_version (для cache invalidation key).'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  model:
                    type: string
                    example: gemini-2.5-flash
                  prompt_version:
                    type: string
                    example: v1.0
                  prompt:
                    type: string
                    description: Полный текст Stage 1 prompt'а (long string)
                  notes:
                    type: string
        '403':
          description: Not superadmin

  /functions/v1/admin/prompts/generate:
    get:
      tags: [Admin]
      summary: Stage 2 template + model
      description: 'Returns `STAGE_2_TEMPLATE` raw template с `{placeholder}` токенами. Tokens fill at runtime per (category, shot_type, lighting, user_text) — см. `generate/prompt-builder.ts` assembly logic.'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  model:
                    type: string
                  template:
                    type: string
                  notes:
                    type: string

  /functions/v1/admin/categories:
    get:
      tags: [Admin]
      summary: 7 категорий с UI names (en/ru) + Gemini-prompt names
      description: |
        Returns slugs всех 7 категорий + UI names на en/ru ("Clothing & Footwear" / "Одежда и обувь") + Gemini-prompt names ("Clothing and footwear" — для natural prose в Stage 2 prompt).

        Разные форматирования намеренно — UI vs LLM audiences.
      responses:
        '200':
          description: OK

  /functions/v1/admin/languages:
    get:
      tags: [Admin]
      summary: Поддерживаемые локали
      description: 'Returns три списка: supported by `/shot-types` (`en`, `ru`), allowed by `profiles.locale` CHECK (`en`, `ru`, `hy`), `LocalizedString` keys. `hy` — partially supported (schema allows, UI translations не shipped).'
      responses:
        '200':
          description: OK

  /functions/v1/admin/shot-types:
    get:
      tags: [Admin]
      summary: Full SHOT_TYPE_BLOCKS dict (все 28 блоков)
      description: |
        Heavy response (~650 строк JSON). 28 blocks с полными internal fields (scene, framing, lighting, avoid_extras, angle_priority, final_check_extras) которые `/shot-types` endpoint НЕ отдаёт (они English-only для Gemini).
      responses:
        '200':
          description: OK

  /functions/v1/admin/lighting:
    get:
      tags: [Admin]
      summary: 4 lighting profiles с полной prose
      description: '4 profiles (`daylight`, `studio`, `sunset`, `rim`) — slugs + полные prose описания. Юзер опционально выбирает один в `/image-generate` body → backend заменяет default lighting блока на этот.'
      responses:
        '200':
          description: OK

  /functions/v1/admin/aspect-ratios:
    get:
      tags: [Admin]
      summary: 5 Runpik-allowed + 10 Gemini-supported aspect ratios
      description: |
        Gemini supports 10 значений: `21:9, 16:9, 4:3, 3:2, 1:1, 9:16, 3:4, 2:3, 5:4, 4:5`.
        Runpik UI намеренно ограничен 5: `16:9, 4:3, 1:1, 3:4, 9:16` — для consistency.
        Передаётся в Gemini как `imageConfig.aspectRatio` (camelCase REST).
      responses:
        '200':
          description: OK

  /functions/v1/admin/runtime-config:
    get:
      tags: [Admin]
      summary: 'Runtime config: mock mode, model names, TTLs, credits'
      description: |
        Главный health-check endpoint admin'а. Возвращает все runtime constants одним JSON'ом:
        - `mock_mode` — критичный флаг (если `true`, backend в mock-режиме, реальная Gemini генерация не работает)
        - `prompt_version` — для cache invalidation analyses
        - `gemini_text_model` / `gemini_image_model` — какие модели используются
        - `signed_url_ttl_seconds` — TTL signed URLs (30 дней)
        - `credits_per_generation` — 1
        - `signup_bonus_credits` — 3
        - `deletion_grace_period_days` — 7
      responses:
        '200':
          description: Runtime config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfig'

  /functions/v1/admin/admins:
    get:
      tags: [Admin]
      summary: Список юзеров с role != 'user' (admins + superadmins)
      description: |
        Returns всех юзеров у которых `profiles.role` в (`'admin'`, `'superadmin'`). Sorted superadmin first, потом admins по `created_at ASC` (старейшие первыми).

        Useful для admin UI tab "Admin team". Empty list невозможен — invariant что Karo всегда superadmin.

        Future: будет `GET /admin/users` с pagination и filter для полного списка users (Phase 2+).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  admins:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUserSummary'
                  total:
                    type: integer
                  notes:
                    type: string

  /functions/v1/admin/audit-log:
    get:
      tags: [Admin]
      summary: Recent admin actions (append-only ledger)
      description: |
        Returns recent entries из `admin_audit_log` таблицы. Phase 1 пустой (нет mutating endpoints).

        Phase 2+ mutating actions (set_role, grant_credits, force_delete) будут писать сюда `before+after` payload + result + admin_user_id + timestamp.

        Append-only — никогда UPDATE/DELETE. Compliance + debugging + retroactive policy review.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Сколько recent entries вернуть (1-200)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLogEntry'
                  limit:
                    type: integer
                  total_returned:
                    type: integer
                  notes:
                    type: string

  # ============================================================
  # RPCs
  # ============================================================

  /rest/v1/rpc/get_my_credits_balance:
    post:
      tags: [RPCs]
      summary: Получить мой баланс кредитов
      description: |
        Returns SUM amount из `credits_transactions` для текущего юзера. Балnance может быть отрицательным теоретически (если refund'ы > charge'ов — не должно быть), но в норме >= 0.

        В Flutter: `final balance = await supabase.rpc('get_my_credits_balance');`

        **Important:** RPC использует `auth.uid()` — работает только из authenticated PostgREST context (не из service_role).
      responses:
        '200':
          description: Текущий баланс
          content:
            application/json:
              schema:
                type: integer
                example: 3

  /rest/v1/rpc/schedule_my_account_deletion:
    post:
      tags: [RPCs]
      summary: Запланировать удаление аккаунта (7-day grace period)
      description: |
        Помечает `profiles.deletion_scheduled_at = now()`. Через **7 дней** daily cron `process-account-deletions` удалит юзера (auth.users.delete + CASCADE → profiles, projects, generations, analyses, credits_transactions + Storage blobs).

        **Идемпотентна:** повторные вызовы НЕ сбрасывают countdown — `COALESCE(deletion_scheduled_at, now())`.

        Используется в "Settings → Delete my account" flow Flutter app.
      responses:
        '200':
          description: ISO-8601 timestamp когда deletion был запланирован
          content:
            application/json:
              schema:
                type: string
                format: date-time

  /rest/v1/rpc/cancel_my_account_deletion:
    post:
      tags: [RPCs]
      summary: Отменить запланированное удаление аккаунта
      description: 'Set `profiles.deletion_scheduled_at = NULL`. Аккаунт остаётся active.'
      responses:
        '200':
          description: void (deletion отменён)

  /functions/v1/home-blocks:
    get:
      tags: [Home]
      summary: Контент-блоки Home-таба (public, i18n, ETag)
      description: |
        Публичная лента **модульных контент-блоков** Home-таба. `how_it_works` = модель **продукты × стадии**: блок несёт `stages` (упорядоченные типизированные колонки) + `products` (активные, у каждого `data.cells[stageId] = Media[]`). Media = `{ type:"image", image_url, label? }`. Стадии: `before` (1 медиа = левый селектор), `shot_types` (0..N).

        **No auth** — `verify_jwt = false`. **i18n:** `title`/`subtitle`/`data.label` отдаются целиком как `LocalizedString {en, ru?, hy?}` — клиент локализует сам (response локоле-независим, `?locale=` не нужен).

        **Кэширование:** ответ содержит `ETag`, `Last-Modified`, `Cache-Control: public, max-age=300`. Шли `If-None-Match: <etag>` — при совпадении вернётся **304** без тела. ETag может прийти weak (`W/"..."`) — шли обратно как есть. Flutter: кэшируй ETag локально, шли `If-None-Match`, при 304 используй кэш.

        **Продукт `data` (how_it_works):** `{ label, cells: { [stageId]: [{ type:"image", image_url, label? }] } }`. Frontend: клик по продукту (стадия `before`) → все колонки показывают его медиа; клик по миниатюре в колонке меняет превью только этой колонки.
      security: []
      parameters:
        - in: header
          name: If-None-Match
          required: false
          schema:
            type: string
          description: 'Ранее полученный ETag. Совпадение → 304 без тела.'
      responses:
        '200':
          description: Активные блоки + items
          headers:
            ETag:
              schema: { type: string, example: 'W/"hb-1780917981593-1-2"' }
            Last-Modified:
              schema: { type: string }
            Cache-Control:
              schema: { type: string, example: public, max-age=300 }
          content:
            application/json:
              schema:
                type: object
                properties:
                  blocks:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        type: { type: string, example: how_it_works }
                        title:
                          type: object
                          additionalProperties: { type: string }
                          example: { en: How it works, ru: Как это работает }
                        subtitle:
                          type: object
                          nullable: true
                          additionalProperties: { type: string }
                        footer:
                          type: object
                          nullable: true
                          additionalProperties: { type: string }
                          description: 'Общая строка под секцией (LocalizedString) или null'
                        display_order: { type: integer }
                        stages:
                          type: array
                          description: 'Упорядоченные колонки. how_it_works: [{ id, type (before|shot_types), title LocalizedString, subtitle? }]'
                          items:
                            type: object
                            properties:
                              id: { type: string }
                              type: { type: string, example: before }
                              title: { type: object, additionalProperties: { type: string } }
                              subtitle: { type: object, additionalProperties: { type: string } }
                        products:
                          type: array
                          description: 'Активные продукты (= items). how_it_works data: { label LocalizedString, cells: { [stageId]: [{ type:"image", image_url, label? }] } }. before=1 медиа, shot_types=0..N.'
                          items:
                            type: object
                            properties:
                              id: { type: string, format: uuid }
                              data: { type: object }
                              display_order: { type: integer }
                  updated_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: 'max(updated_at) по активным блокам, или null'
        '304':
          description: Not Modified — If-None-Match совпал (тела нет)
        '405':
          description: Метод ≠ GET

  /functions/v1/admin-home-blocks:
    get:
      tags: [Home]
      summary: Список всех Home-блоков + items (admin/superadmin)
      description: |
        Все блоки (любой `is_active`) вместе с их items. Роль **admin | superadmin** (`requireHomeBlockManager`).
        Типы блоков валидируются в коде (сейчас `how_it_works`); новый тип = только код.
      responses:
        '200':
          description: '{ blocks: [...with items...], total }'
        '401': { description: Нет JWT }
        '403': { description: Не admin/superadmin }
    post:
      tags: [Home]
      summary: Создать блок
      description: 'Создать Home-блок. Для `how_it_works` блок несёт title/subtitle/footer всей секции.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, title]
              properties:
                type: { type: string, example: how_it_works }
                title: { type: object, additionalProperties: { type: string }, description: 'LocalizedString, en обязателен' }
                subtitle: { type: object, nullable: true, additionalProperties: { type: string } }
                footer: { type: object, nullable: true, additionalProperties: { type: string }, description: 'Строка под секцией' }
                display_order: { type: integer }
                is_active: { type: boolean }
      responses:
        '201': { description: '{ block }' }
        '400': { description: Невалидное тело/type }
        '403': { description: Не admin }

  /functions/v1/admin-home-blocks/reorder:
    post:
      tags: [Home]
      summary: Переупорядочить блоки
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: string, format: uuid }, description: 'новый порядок сверху-вниз; display_order=(pos+1)*10' }
      responses:
        '200': { description: '{ ok, reordered }' }
        '400': { description: Невалидные ids }

  /functions/v1/admin-home-blocks/upload-image:
    post:
      tags: [Home]
      summary: Загрузить картинку (multipart) → { url, path }
      description: |
        Загружает файл в bucket `home-blocks` под `{block_type}/{uuid}.{ext}` и возвращает public `url` + `path`.
        Admin UI затем кладёт `url` в `data.images[i].image_url` при создании/обновлении item.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: 'jpeg/png/webp, ≤5 MiB' }
                block_type: { type: string, description: 'папка (по умолчанию how_it_works)' }
      responses:
        '201': { description: '{ url, path }' }
        '400': { description: Нет файла / неверный тип / >5 MiB }

  /functions/v1/admin-home-blocks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Home]
      summary: Обновить блок
      description: 'Любое подмножество. `subtitle`/`footer` = `null` очищает.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: object, additionalProperties: { type: string } }
                subtitle: { type: object, nullable: true, additionalProperties: { type: string } }
                footer: { type: object, nullable: true, additionalProperties: { type: string } }
                display_order: { type: integer }
                is_active: { type: boolean }
      responses:
        '200': { description: '{ block }' }
        '404': { description: Блок не найден }
    delete:
      tags: [Home]
      summary: Удалить блок (cascade items + cleanup блобов)
      responses:
        '200': { description: '{ deleted: true, id }' }
        '404': { description: Блок не найден }

  /functions/v1/admin-home-blocks/{id}/stages:
