      - { in: path, name: iid, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [Landing]
      summary: Обновить карточку (before.label/after.label/is_public/display_order)
      description: '`image_url` тут не меняется (только image-роут). `is_public=true` гейтится — обе картинки + обе en-подписи, иначе 422.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                before: { type: object, description: 'опц. { label }' }
                after: { type: object, description: 'опц. { label }' }
                is_public: { type: boolean }
                display_order: { type: integer }
      responses:
        '200': { description: '{ item }' }
        '400': { description: Невалидное тело }
        '404': { description: Карточка не найдена }
        '422': { description: 'Publish неполной карточки — { error, missing }' }
    delete:
      tags: [Landing]
      summary: Удалить карточку (+ блобы)
      responses:
        '200': { description: '{ deleted: true, id }' }
        '404': { description: Карточка не найдена }

  /functions/v1/admin-landing-blocks/{id}/items/{iid}/image:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      - { in: path, name: iid, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Landing]
      summary: Загрузить картинку before|after (multipart)
      description: 'Грузит файл в bucket `landing-blocks` под `hero/{item_id}-{kind}.{ext}` и проставляет `image_url` в карточке. Устаревшие ext-варианты того же kind подчищаются.'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [kind, file]
              properties:
                kind: { type: string, enum: [before, after] }
                file: { type: string, format: binary, description: 'jpeg/png/webp, ≤5 MiB' }
      responses:
        '201': { description: '{ item, kind, url }' }
        '400': { description: Нет файла / неверный kind / тип / >5 MiB }
        '404': { description: Карточка не найдена }
    delete:
      tags: [Landing]
      summary: Удалить картинку before|after
      description: 'Удаляет картинку и блоб. У опубликованной карточки запрещено (409) — сначала unpublish.'
      parameters:
        - in: query
          name: kind
          required: true
          schema: { type: string, enum: [before, after] }
      responses:
        '200': { description: '{ item, kind, removed }' }
        '400': { description: Неверный kind }
        '404': { description: Карточка не найдена }
        '409': { description: Карточка опубликована — сначала unpublish }

  /rest/v1/subscription_plans:
    get:
      tags: [Profile]
      summary: Каталог тарифов (публичный, для paywall)
      description: |
        Тарифы для paywall. Публично читаемо (`is_active=true`). Источник правды для
        названий/кредитов/фич/badge/highlight. Цены НЕ здесь (веб — `subscription_skus`,
        натив — стор). `≈ N photos` = `credits_monthly` ÷ мин. цена операции
        `image-generate` активных gems (см. `GET /gems` → `operations`).
      parameters:
        - { in: query, name: select, schema: { type: string }, example: '*' }
        - { in: query, name: is_active, schema: { type: string }, example: eq.true }
        - { in: query, name: order, schema: { type: string }, example: sort_order.asc }
      responses:
        '200':
          description: Массив тарифов
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubscriptionPlan' }

  /rest/v1/subscription_skus:
    get:
      tags: [Profile]
      summary: Цены и checkout-ссылки тарифов (публичный)
      description: |
        Строка на (план × период). `price_amount`+`currency` — веб display-цена
        (для yearly — годовая сумма; клиент делит на 12 для «$/mo»).
        `lemonsqueezy_buy_url` — web checkout (добавь
        `&checkout[custom][user_id]=<uid>`). Натив-цена — из стора (`rc_package`).
      parameters:
        - { in: query, name: select, schema: { type: string }, example: '*' }
        - { in: query, name: is_active, schema: { type: string }, example: eq.true }
      responses:
        '200':
          description: Массив SKU
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubscriptionSku' }

  /rest/v1/subscriptions:
    get:
      tags: [Profile]
      summary: Мои подписки (биллинг-история)
      description: |
        Подписки текущего юзера (RLS `auth.uid()=user_id`). Текущий план/статус для UI.
        Пишутся только webhook'ами платформ (Lemon Squeezy / RevenueCat).
      parameters:
        - { in: query, name: select, schema: { type: string }, example: '*' }
        - { in: query, name: order, schema: { type: string }, example: created_at.desc }
      responses:
        '200':
          description: Массив подписок
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Subscription' }

  /rest/v1/payments:
    get:
      tags: [Profile]
      summary: Мои платежи (история)
      description: |
        Платежи текущего юзера (RLS `auth.uid()=user_id`): покупки/продления/
        возвраты. Пишутся только webhook'ами платформ (Lemon Squeezy / RevenueCat).
      parameters:
        - { in: query, name: select, schema: { type: string }, example: '*' }
        - { in: query, name: order, schema: { type: string }, example: created_at.desc }
      responses:
        '200':
          description: Массив платежей
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Payment' }

# ============================================================
# COMPONENTS — Reusable schemas, security
# ============================================================

components:
  securitySchemes:
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT залогиненного юзера. Получается через `POST /auth/v1/token?grant_type=password`. Срок жизни ~1 час, supabase-flutter SDK автоматически refresh'ит через refresh_token.
        В Postman: сохрани access_token в env variable через Tests script после sign-in, используй как `Authorization: Bearer {{access_token}}`.
    AnonApiKey:
      type: apiKey
      in: header
      name: apikey
      description: |
        Анонимный JWT проекта (публичный). Получить через Supabase Dashboard → Project Settings → API → `anon` public. Безопасно вшивать в client — защита данных через RLS, не через секретность ключа.
        В Postman: `apikey: {{anon_key}}` в env variable.

  parameters:

    StyleId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: UUID стиля из таблицы `styles`

    EnvironmentId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: UUID окружения из таблицы `environments`

  schemas:

    # ---- Billing / subscriptions (paywall) ----

    SubscriptionPlan:
      type: object
      description: 'Тариф (каталог paywall). Публично читаем (is_active=true). Цены не здесь.'
      properties:
        code: { type: string, example: creator }
        title: { $ref: '#/components/schemas/LocalizedText' }
        description: { $ref: '#/components/schemas/LocalizedText' }
        credits_monthly: { type: integer, example: 180 }
        features:
          type: array
          description: 'Фичи для карточки. Variant A: одинаковы у тарифов.'
          items:
            type: object
            properties:
              label: { $ref: '#/components/schemas/LocalizedText' }
              included: { type: boolean }
        badge: { type: object, nullable: true, description: 'Локализ. текст пилюли {en,ru} (Most popular / Best value) или null.' }
        highlight: { type: string, nullable: true, enum: [popular, flagship], example: popular }
        is_popular: { type: boolean }
        is_active: { type: boolean }
        sort_order: { type: integer }

    SubscriptionSku:
      type: object
      description: 'SKU тарифа: план × период + цена/checkout. Публично читаем.'
      properties:
        plan_id: { type: string, format: uuid }
        period: { type: string, enum: [monthly, yearly] }
        price_amount: { type: number, example: 12, description: 'Веб display-цена; для yearly — годовая сумма.' }
        currency: { type: string, example: USD }
        price_display: { type: string, example: '$12/mo' }
        lemonsqueezy_variant_id: { type: string, example: '1840415' }
        lemonsqueezy_buy_url: { type: string, description: 'Web checkout; добавь `&checkout[custom][user_id]=<uid>`.' }
        rc_package: { type: string, nullable: true, example: 'starter_monthly', description: 'RevenueCat package identifier (offering default).' }
        google_product_id: { type: string, nullable: true, example: 'runpik_starter:starter-monthly', description: 'Google Play product:basePlan (RevenueCat-мапинг).' }
        apple_product_id: { type: string, nullable: true, description: 'App Store product id (iOS — позже).' }
        is_active: { type: boolean }

    Subscription:
      type: object
      description: 'Подписка юзера (RLS own). Пишется webhook платформ; кросс-платформенная.'
      properties:
        id: { type: string, format: uuid }
        platform: { type: string, enum: [lemonsqueezy, revenuecat] }
        store: { type: string, nullable: true, enum: [app_store, play_store] }
        plan_id: { type: string, format: uuid, nullable: true }
        period: { type: string, nullable: true, enum: [monthly, yearly] }
        status: { type: string, enum: [active, trialing, cancelled, expired, paused, past_due, unknown] }
        cancel_at_period_end: { type: boolean }
        current_period_end: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        is_test: { type: boolean, description: 'Sandbox/test событие (LS test_mode / RC SANDBOX). Реальные = false.' }
        created_at: { type: string, format: date-time }

    Payment:
      type: object
      description: 'Платёж юзера (RLS own). История денег; пишется webhook платформ.'
      properties:
        id: { type: string, format: uuid }
        subscription_id: { type: string, format: uuid, nullable: true }
        platform: { type: string, enum: [lemonsqueezy, revenuecat] }
        store: { type: string, nullable: true, enum: [app_store, play_store] }
        kind: { type: string, enum: [subscription_initial, subscription_renewal, topup, refund, other] }
        status: { type: string, enum: [paid, refunded, partially_refunded, failed, pending] }
        amount_cents: { type: integer, nullable: true, example: 500 }
        currency: { type: string, nullable: true, example: USD }
        discount_cents: { type: integer }
        is_test: { type: boolean }
        paid_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    # ---- AI ecosystem (gems / engines) ----

    LocalizedText:
      type: object
      description: 'Локализованный текст {en,ru,hy}. en — основной; ru/hy опц. (fallback на en).'
      additionalProperties: { type: string }
      example: { en: "Quartz", ru: "Quartz", hy: "Quartz" }

    EngineRef:
      type: object
      description: 'Ссылка камня на движок с приоритетом. priority 1 = основной, 2+ = fallback.'
      required: [engine_id, priority]
      properties:
        engine_id: { type: string, format: uuid }
        priority: { type: integer, minimum: 1 }

    GemWritable:
      type: object
      description: 'Редактируемые поля камня (gems). Для POST обязательны code + gen_content_type_id; для PATCH — любой subset.'
      properties:
        code:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
          description: 'Внутренний код (snake_case), уникален (дубль → 409).'
          example: quartz
        display_name: { $ref: '#/components/schemas/LocalizedText' }
        description: { $ref: '#/components/schemas/LocalizedText' }
        gen_content_type_id:
          type: string
          format: uuid
          description: 'Тип контента (IMAGE/CARD/VIDEO). Должен существовать.'
        is_active: { type: boolean }
        sort_order: { type: integer, description: 'Порядок в списках (ASC). НЕ version — версия отдельное поле.' }
        is_default: { type: boolean, description: 'true авто-снимает default у других камней того же типа.' }
        version:
          type: number
          example: 2.0
          description: 'Юзер-версия (2026-07-18), >0 и <100. Уникальна ВНУТРИ content type (дубль → 409 с текстом "…already uses that version"). Дефолт 1.0.'
        new_until:
          type: string
          format: date-time
          nullable: true
          description: 'Окно авто-бейджа «new» (2026-07-18). Пока now()<new_until, публичный /gems показывает бейдж new. null = не показывать. ВАЖНО: если при POST поле не передать — бэкенд ставит now()+30д автоматически; передай null явно, чтобы создать без «new». В админ-GET поле видно; в публичном /gems наружу НЕ отдаётся (там уже готовый бейдж).'
        badges:
          type: array
          description: 'Курируемые бейджи (2026-07-18). Бейдж «new» сюда НЕ кладём — им управляет new_until. PATCH заменяет массив целиком (не merge).'
          items:
            type: object
            required: [code]
            properties:
              code: { type: string, pattern: '^[a-z][a-z0-9_-]*$', example: popular }
              label: { $ref: '#/components/schemas/LocalizedText' }
              tone: { type: string, nullable: true, example: premium }
      # 2026-07-11: цены + движки сняты с камня → gem_operations (GemOperationWritable),
      # правятся роутами PUT/DELETE /admin-gems/{id}/operations/{op}.

    GemOperationWritable:
      type: object
      description: 'Операция камня (gem_operations, 2026-07-11): цена + тайминг + движки одной операции. Тело PUT /admin-gems/{id}/operations/{op}.'
      required: [credit_price]
      properties:
        credit_price: { type: integer, minimum: 0, description: 'Кредиты с юзера за операцию (0 = free). Стоимость генерации = сумма операций.' }
        charge_timing:
          type: string
          nullable: true
          enum: [on_generate, on_create, on_request]
          description: 'Когда списывать (платные). null = free.'
        note: { type: string, nullable: true, description: 'Внутренняя заметка про подсчёт.' }
        engines:
          type: array
          items: { $ref: '#/components/schemas/EngineRef' }
          description: 'Fallback-движки операции (priority 1 = основной). Каждый engine_id валидируется. Внутреннее — /gems вырезает.'

    Gem:
      description: 'Камень (полный объект ответа admin). display_name/description — объекты {en,ru,hy}.'
      allOf:
        - $ref: '#/components/schemas/GemWritable'
        - type: object
          properties:
            id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    AiEngineWritable:
      type: object
      description: 'Редактируемые поля скрытого движка (ai_engines). Для POST обязательны display_name + vendor + provider_model + modality.'
      properties:
        display_name: { type: string, description: 'Внутреннее имя для админки, НЕ переводится.' }
        vendor: { type: string, example: gemini }
        provider_model: { type: string, example: gemini-2.5-flash-image }
        modality:
          type: string
          enum: [text, image, video]
          description: 'Что движок ПРОИЗВОДИТ (2026-07-14). Обязательно на POST. Используется для валидации привязки op↔движок (image-операции нужен image-движок). Отличается от контент-типа IMAGE/CARD (карточка — тоже картинка).'
        version: { type: string, example: '2.5' }
        cost_per_op: { type: number, description: 'Себестоимость у вендора, напр. 0.039.' }
        cost_unit:
          type: string
          enum: [per_image, per_second, per_1k_tokens, per_request]
        # 2026-07-11: per-op токен-хинты (token_*) удалены — движок держит только
        # реальные факты вендора; операции/цены живут на камне (gem_operations).
        api_key_name: { type: string, description: 'ИМЯ Edge-секрета (Deno.env), НЕ значение ключа.' }
        valid_until: { type: string, format: date, description: 'YYYY-MM-DD; UI предупреждает о скором EOL.' }
        notes: { type: string }
        is_active: { type: boolean }

    AiEngine:
      description: 'Движок (полный объект ответа admin). used_by_gems/referenced_by присутствуют только в GET-списке.'
      allOf:
        - $ref: '#/components/schemas/AiEngineWritable'
        - type: object
          properties:
            id: { type: string, format: uuid }
            used_by_gems: { type: integer, description: 'Кол-во РАЗНЫХ камней, ссылающихся на движок (только в GET-списке).' }
            referenced_by:
              type: array
              items: { type: string }
              description: 'Коды камней, ссылающихся на движок (только в GET-списке).'
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    # ---- Enums ----

    ProductCategory:
      type: string
      enum:
        - clothing_footwear
        - accessories
        - food_drinks
        - cosmetics
        - electronics
        - home_furniture
        - other
      description: '7 фиксированных категорий продуктов. Список enforced в трёх местах синхронно: Stage 1 prompt, `ProductCategory` TypeScript type, `SHOT_TYPE_BLOCKS` keys.'

    PreservationPriority:
      type: string
      enum:
        - logo_and_text
        - exact_colors
        - shape_and_proportions
        - material_texture
        - overall
      description: 'Какой аспект продукта наиболее критично сохранить при регенерации.'

    EnvironmentListItem:
      type: object
      description: 'Окружение как его видит `GET /environments`. БЕЗ `scene_prompt` (backend-only).'
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: 'Локализованное имя (по `?locale=`, fallback на `en`).'
        tags:
          type: array
          items:
            type: string
        image_url:
          type: string
          format: uri
          nullable: true
          description: 'Signed URL исходного фото (bucket приватный), TTL 30 дней.'
        match_percent:
          type: integer
          description: 'Applied Environment Match % (Low <50 / Medium 50-70 / High 70+).'
        created_at:
          type: string
          format: date-time

    EnvironmentCreateResponse:
      type: object
      description: 'Ответ `POST /environments`. БЕЗ `scene_prompt` (backend-only).'
      properties:
        environment_id:
          type: string
          format: uuid
        name:
          $ref: '#/components/schemas/LocalizedString'
        tags:
          type: array
          items:
            type: string
        match_percent:
          type: integer
        summary:
          type: object
          properties:
            location_type:
              type: string
              nullable: true
            mood:
              type: string
              nullable: true
        is_suitable:
          type: object
          properties:
            verdict:
              type: boolean
            confidence:
              type: integer
            warnings:
              type: array
              items:
                type: string
            blockers:
              type: array
              items:
                type: string

    StylePublic:
      type: object
      description: 'Стиль как его видит публичный `/styles` endpoint. БЕЗ `style_prompt` (IP).'
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          example: apothecary_sand
        title:
          type: string
          description: 'Локализованный заголовок (по `?locale=`)'
        description:
          type: string
          description: 'Локализованное описание'
        excluded_categories:
          type: array
          items:
            $ref: '#/components/schemas/ProductCategory'
          description: 'Категории, с которыми стиль несовместим — фронт может задизейблить стиль для такого продукта.'
        before_image_url:
          type: string
          format: uri
          nullable: true
          description: 'Public CDN URL (bucket публичный, signed не нужен)'
        after_image_url:
          type: string
          format: uri
          nullable: true

    StyleAdmin:
      type: object
      description: 'Полная строка стиля для admin (`/admin-styles`), включая `style_prompt` и пути картинок.'
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        title_en: { type: string }
        title_ru: { type: string }
        description_en: { type: string }
        description_ru: { type: string }
        style_prompt:
          type: string
          description: 'English-only style overlay prose. Backend-only — публичный `/styles` его вырезает.'
        excluded_categories:
          type: array
          items:
            $ref: '#/components/schemas/ProductCategory'
        before_image_path:
          type: string
          nullable: true
          description: '`{style_id}/before.{ext}` внутри bucket `style-references`. NULL до загрузки.'
        after_image_path:
          type: string
          nullable: true
        is_published:
          type: boolean
          description: 'Требует обе картинки чтобы стать true (CHECK + 422).'
        sort_order:
          type: integer
          description: 'Admin-порядок каталога. Сортировка sort_order ASC, created_at DESC. Задаётся через POST /admin-styles/reorder. (2026-06-07)'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        created_by:
          type: string
          format: uuid
          nullable: true

    Lighting:
      type: string
      enum: [daylight, studio, sunset, rim]
      description: 'User-selectable lighting profile. Optional в `/image-generate` body. Если передан — заменяет default lighting prose шот-тайпа. NULL = дефолт блока.'

    AspectRatio:
      type: string
      enum: ['16:9', '4:3', '1:1', '3:4', '9:16']
      description: 'User-selectable aspect ratio. Optional в `/image-generate` body. Прокидывается в Gemini как `imageConfig.aspectRatio` (camelCase REST). NULL = Gemini auto-detect из input image.'

    SupportedLocale:
      type: string
      enum: [en, ru]
      description: 'Locales поддерживаемые `/shot-types` endpoint. `profiles.locale` CHECK дополнительно allows `hy` но UI translations пока не shipped.'

    UserRole:
      type: string
      enum: [user, admin, superadmin]
      description: |
        RBAC role. Default `user` для всех новых юзеров.
        - `user` — regular user (most юзеров). Видит только свои данные через RLS.
        - `admin` — будущий moderator (Phase 2+, пока не присваивается)
        - `superadmin` — god-level access. Может вызывать `/admin/*` endpoints. Manual UPDATE только (never self-service).

    LocalizedString:
      type: object
      description: 'Локализованная строка. `en` — required canonical, `ru` и `hy` — optional fallback на `en`.'
      properties:
        en:
          type: string
        ru:
          type: string
        hy:
          type: string
      required: [en]

    # ---- Auth ----

    AuthUser:
      type: object
      description: 'Юзер из Supabase Auth. ID совпадает с `profiles.id`.'
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        last_sign_in_at:
          type: string
          format: date-time
        user_metadata:
          type: object
          description: "Произвольные данные из `data` поля signup'а (e.g. `full_name`)."

    AuthErrorResponse:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
        msg:
          type: string

    # ---- Profile ----

    Profile:
      type: object
      description: 'Профиль юзера. Один row на одного `auth.users`. Создаётся `handle_new_user` триггером на signup.'
      properties:
        id:
          type: string
          format: uuid
          description: 'FK на `auth.users.id`, cascade delete. Совпадает с твоим JWT UID.'
        email:
          type: string
          format: email
        display_name:
          type: string
          description: 'Из `raw_user_meta_data.full_name` или email local-part.'
        avatar_url:
          type: string
          format: uri
          nullable: true
        locale:
          type: string
          enum: [en, ru, hy]
        role:
          $ref: '#/components/schemas/UserRole'
        tos_accepted_at:
          type: string
          format: date-time
          nullable: true
          description: 'NULL до acceptance. Записывается фронтом через PostgREST UPDATE после signup или re-acceptance.'
        privacy_accepted_at:
          type: string
          format: date-time
          nullable: true
        deletion_scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: 'NULL = активный. Set через RPC `schedule_my_account_deletion()`. Через 7 дней cron удалит юзера.'
        subscription_credits:
          type: integer
          description: 'Баланс подписочного кошелька кредитов. Сбрасывается каждый месячный цикл (не накапливается). Кэш SUM леджера по bucket=subscription. _(2026-06-16)_'
        topup_credits:
          type: integer
          description: 'Баланс купленного кошелька кредитов (вечный, v1.1). Кэш SUM по bucket=topup. Списание тратит сначала subscription, потом topup. _(2026-06-16)_'
        plan_id:
          type: string
          format: uuid
          nullable: true
          description: 'FK на текущий тариф (`subscription_plans`). На signup = Free. _(2026-06-16)_'
        entitlement_until:
          type: string
          format: date-time
          nullable: true
          description: 'Когда заканчивается платный entitlement (NULL = free/без срока). _(2026-06-16)_'
        cycle_started_at:
          type: string
          format: date-time
          nullable: true
          description: 'Начало текущего месячного цикла кредитов. _(2026-06-16)_'
        payment_source:
          type: string
          enum: [apple, google, web]
          nullable: true
          description: 'Источник оплаты подписки. _(2026-06-16)_'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---- Projects ----

    Project:
      type: object
      description: 'Workspace-like группировка. Каждая generation/analysis принадлежит project''у. У юзера всегда >= 1 (invariant).'
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          description: 'Auto-filled через DEFAULT auth.uid() — фронту передавать НЕ нужно.'
        name:
          type: string
          minLength: 1
          maxLength: 30
          description: 'User-editable. CHECK constraint 1-30 chars. Default = today UTC date "YYYY-MM-DD".'
        is_pinned:
          type: boolean
          default: false
          description: 'Pinned projects всплывают наверху списка. Best-practice query: `ORDER BY is_pinned DESC, sort_order, created_at DESC`.'
        is_public:
          type: boolean
          default: false
          description: 'Schema-only пока. RLS оставляет всё private до per-image `generations.is_public` shipnет.'
        sort_order:
          type: integer
          default: 0
          description: 'User drag-and-drop sort. Integer (можешь использовать gaps 10, 20, 30 для удобства insert'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Generation:
      type: object
      description: 'Одна попытка генерации (успех или сбой). Создаётся в `/image-generate` (IMAGE) или `/card-generate` (CARD).'
      properties:
        id:
          type: string
          format: uuid
        content_type:
          type: string
          enum: [IMAGE, CARD]
          description: 'Дискриминатор: IMAGE (дефолт) или CARD. Для грид Works (фильтр карточки vs фото). Добавлено 2026-07-13.'
        card_brief:
          type: object
          nullable: true
          description: 'Для CARD: использованный бриф (текст+дизайн), запечённый в картинку. NULL для IMAGE. ОДИН язык (поле `language`), НЕ {en,ru}. Клиент читает через обычный PostgREST-select по `generations` (RLS отдаёт владельцу) — отдельного эндпоинта нет. Наследуется всеми версиями группы; `/card-improve` его НЕ обновляет (может отставать от картинки, если improve правил текст). `design.*` — ПРОЗА-строки (не hex/структура).'
          properties:
            language: { type: string, example: ru }
            copy:
              type: object
              properties:
                eyebrow: { type: string, nullable: true }
                headline: { type: string, description: 'всегда присутствует' }
                subheadline: { type: string, nullable: true }
                features:
                  type: array
                  items:
                    type: object
                    properties:
                      label: { type: string }
                      detail: { type: string }
                      icon_hint: { type: string }
                badge:
                  type: object
                  nullable: true
                  properties:
                    text: { type: string }
                    kind: { type: string }
                footer_tagline: { type: string, nullable: true }
            design:
              type: object
              description: 'Все 4 поля — свободный текст (проза), НЕ структура и НЕ hex.'
              properties:
                font_personality: { type: string }
                palette: { type: string }
                mood: { type: string }
                layout_hint: { type: string }
            meta:
              type: object
              properties:
                emphasis: { type: string }
                locked_texts: { type: array, items: { type: string } }
        user_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
          description: 'NOT NULL — каждая generation принадлежит project''у. ON DELETE CASCADE.'
        analysis_id:
          type: string
          format: uuid
          description: 'FK на `analyses.id`. Set null при удалении analysis.'
        gem_id:
          type: string
          format: uuid
          nullable: true
          description: 'Камень (`gems`), выбранный для генерации. ON DELETE SET NULL. NULL у legacy-строк. (2026-06-16)'
        engine_id:
          type: string
          format: uuid
          nullable: true
          description: 'Реально отработавший движок (после priority/fallback). ON DELETE SET NULL. NULL в mock / legacy. (2026-06-16)'
        shot_type:
          type: string
        user_text:
          type: string
          nullable: true
        lighting:
          allOf:
            - $ref: '#/components/schemas/Lighting'
          nullable: true
        aspect_ratio:
          allOf:
            - $ref: '#/components/schemas/AspectRatio'
          nullable: true
        status:
          type: string
          enum: [pending, processing, done, failed]
        input_image_path:
          type: string
          description: 'Путь в `inputs` bucket. Копия из analyses row.'
        output_image_path:
          type: string
          nullable: true
          description: 'Путь в `outputs` bucket: `{user_id}/{generation_id}.jpg`. NULL для failed.'
        prompt_used:
          type: string
          nullable: true
          description: 'Финальный Stage 2 prompt. NULL в mock-режиме (полезно как маркер) и для failed rows.'
        error_message:
          type: string
          nullable: true
          description: 'Заполняется при `status=failed`. Для Gemini ошибок — содержит первые 500 байт response body.'
        credits_charged:
          type: integer
          description: 'Списанные кредиты = цена операции `image-generate` камня (Quartz = 4). До 2026-06-16 всегда 1.'
        created_at:
          type: string
          format: date-time

    # ---- ProductAnalysis (the big one) ----

    ProductAnalysis:
      type: object
      description: |
        Структурированный JSON возвращаемый Gemini Flash text в Stage 1. Контракт между `/product-analyze` и `/image-generate`.
      properties:
        product:
          type: object
          properties:
            category:
              $ref: '#/components/schemas/ProductCategory'
            category_confidence:
              type: integer
              minimum: 0
              maximum: 100
            subcategory:
              type: string
              description: 'Свободный текст, e.g. "honey layer cake"'
            name_guess:
              type: string
              description: 'Короткое визуальное описание (кормит Stage 2, НЕ заголовок)'
            product_name:
              allOf:
                - $ref: '#/components/schemas/LocalizedString'
              nullable: true
              description: |
                Локализованное имя-заголовок товара ({en, ru}), предлагаемое AI для UI. Может отсутствовать/быть null (AI не опознал товар). НЕ используется в Stage 2 — чистый UI-identity. Фронт берёт по локали юзера; финальное (отредактированное) имя передаётся в `/image-generate` как `product_name`. (2026-06-07)
        appearance:
          type: object
          properties:
            primary_colors:
              type: array
              items:
                type: string
            secondary_colors:
              type: array
              items:
                type: string
            materials:
              type: array
              items:
                type: string
            texture:
              type: string
            shape:
              type: string
            distinctive_features:
              type: array
              items:
                type: string
              description: 'MUST-PRESERVE элементы с деталями и локацией'
            text_on_product:
              type: string
              description: 'Дословный текст или строка `"none"`'
        current_state:
          type: object
          properties:
            orientation_in_photo:
              type: string
            framing:
              type: string
            background_quality:
              type: string
            lighting_quality:
              type: string
            color_cast:
              type: string
            issues_to_fix:
              type: array
              items:
                type: string
              description: 'Проблемы которые regeneration должна решить'
        regeneration_guidance:
          type: object
          properties:
            preservation_priority:
              $ref: '#/components/schemas/PreservationPriority'
            tricky_aspects:
              type: array
              items:
                type: string
            recommended_shot_type:
              type: string
              description: 'Лучший slug из category-specific списка'
            recommended_shot_type_reasoning:
              type: string
            alternative_shot_types:
              type: array
              items:
                type: string
              description: '1-2 допустимые альтернативы'
            recommended_setting:
              type: object
              nullable: true
              description: |
                AI-арт-директорская рекомендация сцены (2026-06-08). Может отсутствовать/быть null.
                Stage 2: используется в `on_model` (clothing); прочие shot type'ы игнорируют. Фронт может показать юзеру.
              properties:
                location:
                  type: string
                  description: 'Реальная локация под товар: "sunlit flower garden", "moody cobblestone street"'
                time_weather:
                  type: string
                  description: 'Время суток / свет / погода: "warm late-spring afternoon, soft golden daylight"'
                reasoning:
                  type: string
                  description: '1 короткое предложение — почему сцена подходит товару'
            recommended_props:
              type: object
              nullable: true
              description: |
                AI-рекомендация стайлинг-пропсов для flat-lay / styled кадров (2026-06-08). Может отсутствовать/быть null.
                Stage 2: используется в `flat_lay_top_down` (clothing); прочие игнорируют. Фронт может показать юзеру.
              properties:
                items:
                  type: array
                  items:
                    type: string
                  description: '1-2 пропса под товар: ["a woven sunhat", "a few seashells"]'
                reasoning:
                  type: string
                  description: '1 короткое предложение — почему пропсы подходят товару'
        is_suitable:
          type: object
          description: 'КРИТИЧЕСКОЕ поле. Frontend должен проверять `verdict` перед `/image-generate`.'
          properties:
            verdict:
              type: boolean
              description: |
                **`false` → /analyze всё равно вернёт 200**, но `/image-generate` вернёт 422.
                Frontend должен показать blockers screen и НЕ переходить к генерации.
            confidence:
              type: integer
              minimum: 0
              maximum: 100
            warnings:
              type: array
              items:
                type: string
              description: 'Возвращаются юзеру даже при `verdict=true`'
            blockers:
              type: array
              items:
                type: string
              description: 'Populated только когда `verdict=false`'

    # ---- /generate response ----

    GenerateResponse:
      type: object
      properties:
        generation_id:
          type: string
          format: uuid
        analysis_id:
          type: string
          format: uuid
        output_url:
          type: string
          format: uri
          description: 'Постоянный public CDN URL (bucket outputs публичный, не истекает). Строится через `supabase.storage.from(''outputs'').getPublicUrl(output_path)`.'
        output_path:
          type: string
          description: 'Путь внутри `outputs` bucket.'
          example: dd254858-.../9c2f8a-...jpg
        expires_in_seconds:
          type: integer
          example: 2592000
        warnings:
          type: array
          items:
            type: string
          description: 'Копия `analysis.is_suitable.warnings` — frontend может показать юзеру.'
        credits_remaining:
          type: integer
          description: 'Баланс после списания.'
        mock:
          type: boolean
          description: |
            **Поле присутствует ТОЛЬКО когда backend в mock-режиме** (`RUNPIK_MOCK_GENERATION=true`).
            В production когда billing включён — поля не будет в response.
            Frontend может использовать для UI-бейджа "MOCK" в QA builds.

    # ---- Admin ----

    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        display_name:
          type: string
        created_at:
          type: string
          format: date-time

    RuntimeConfig:
      type: object
      properties:
        supabase_project_ref:
          type: string
          example: wnbtsqfdlbjwtetppdng
        mock_mode:
          type: boolean
          description: '**Критичный флаг.** Если `true`, реальная Gemini генерация не работает — `/image-generate` возвращает копию input bytes.'
        prompt_version:
          type: string
          example: v1.0
        gemini_text_model:
          type: string
          example: gemini-2.5-flash
        gemini_image_model:
          type: string
          example: gemini-2.5-flash-image
        signed_url_ttl_seconds:
          type: integer
          example: 2592000
        credits_per_generation:
          type: integer
          example: 1
        signup_bonus_credits:
          type: integer
          example: 3
        deletion_grace_period_days:
          type: integer
          example: 7

    AuditLogEntry:
      type: object
      description: 'Append-only ledger row для admin actions. Phase 1 эти rows не создаются (нет mutating endpoints). Phase 2+ будут.'
      properties:
        id:
          type: string
          format: uuid
        admin_user_id:
          type: string
          format: uuid
          description: 'Кто выполнил action (admin/superadmin)'
        action:
          type: string
          description: 'Action slug — `set_role`, `grant_credits`, `force_delete_user`, etc.'
        target_user_id:
          type: string
          format: uuid
          nullable: true
          description: 'Чьи данные были затронуты'
        target_resource:
          type: string
          nullable: true
          description: 'Free-form resource identifier — `project:<uuid>`, etc.'
        payload:
          type: object
          description: 'Полные params/body admin action'
        result:
          type: object
          nullable: true
          description: 'Before/after state, error message, и т.д.'
        ip_address:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time

    # ---- Errors ----

    ErrorResponse:
      type: object
      description: 'Стандартная error response от Edge Functions.'
      properties:
        error:
          type: string
          description: 'Сообщение об ошибке'
        detail:
          type: string
          description: 'Опционально — детали для 400 errors'
