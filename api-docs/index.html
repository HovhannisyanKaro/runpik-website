<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runpik API Docs</title>
  <meta name="description" content="Runpik Backend API — Swagger / OpenAPI documentation.">
  <link rel="icon" type="image/png" sizes="256x256" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.10.5/swagger-ui.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    /* Hide Swagger UI default top bar (with their logo + URL input) */
    .swagger-ui .topbar { display: none; }

    /* Custom header */
    .runpik-header {
      background: #1a1a1a;
      color: #fff;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
    }
    .runpik-header a {
      color: #fff;
      text-decoration: none;
    }
    .runpik-header .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .runpik-header nav a {
      margin-left: 1.5rem;
      font-size: 0.95rem;
      color: #ccc;
    }
    .runpik-header nav a:hover {
      color: #fff;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .runpik-header {
        padding: 1rem 1.25rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }
      .runpik-header nav a {
        margin-left: 0;
        margin-right: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <header class="runpik-header">
    <a href="/" class="logo">Runpik</a>
    <nav>
      <a href="/">Home</a>
      <a href="/terms.html">Terms</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
  </header>

  <div id="swagger-ui"></div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.10.5/swagger-ui-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.10.5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: '/api-docs/openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: 'StandaloneLayout',
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 2,
        docExpansion: 'list',
        filter: true,
        tagsSorter: 'alpha',
        operationsSorter: 'alpha',
        tryItOutEnabled: true,
        persistAuthorization: true
      });
    };
  </script>
</body>
</html>
