<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Reset password — Runpik</title>
  <meta name="description" content="Set a new password for your Runpik account.">
  <link rel="icon" type="image/png" sizes="256x256" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="landing.css">
  <style>
    .rp-form { max-width: 420px; margin-top: 1.5rem; }
    .rp-field { margin-bottom: 1rem; }
    .rp-field label { display: block; font-size: 0.9rem; color: var(--ink2); margin-bottom: 0.4rem; }
    .rp-field input { width: 100%; box-sizing: border-box; padding: 0.7rem 0.9rem; border-radius: 12px; border: 1px solid var(--line, #2a2a30); background: var(--surface-2, #1F1F24); color: var(--ink); font-family: inherit; font-size: 0.95rem; }
    .rp-field input:focus { outline: none; border-color: #9b95ff; }
    .rp-btn { width: 100%; padding: 0.8rem 1rem; border: 0; border-radius: 13px; background: var(--grad); color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .rp-btn:disabled { opacity: 0.55; cursor: default; }
    .rp-msg { margin-top: 1rem; padding: 0.85rem 1rem; border-radius: 12px; font-size: 0.92rem; line-height: 1.5; }
    .rp-msg.err { border: 1px solid rgba(255,91,91,0.35); background: rgba(255,91,91,0.08); color: #ffb4b4; }
    .rp-msg.ok { border: 1px solid rgba(123,224,163,0.35); background: rgba(123,224,163,0.08); color: #9be8bd; }
    .rp-hint { color: var(--ink3); font-size: 0.82rem; margin-top: 0.4rem; }
    .rp-hide { display: none; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a class="brand" href="index.html"><img class="mark" src="assets/runpik-logo.png" alt="Runpik"><span class="word">Runpik</span></a>
    <a class="btn-grad" href="https://app.runpik.com" target="_blank" rel="noopener">Try for free</a>
  </nav>

  <main class="legal">
    <h1 id="rp-title">Reset your password</h1>
    <p class="last-updated" id="rp-subtitle">Choose a new password for your Runpik account.</p>

    <div class="locale-toggle" role="group" aria-label="Language">
      <button type="button" data-locale="en" class="active">English</button>
      <button type="button" data-locale="ru">Русский</button>
    </div>

    <div id="rp-status" class="rp-msg" style="display:none"></div>

    <form id="rp-form" class="rp-form rp-hide" autocomplete="off">
      <div class="rp-field">
        <label id="rp-label-pass" for="rp-pass">New password</label>
        <input type="password" id="rp-pass" minlength="8" required autocomplete="new-password">
        <div class="rp-hint" id="rp-hint">At least 8 characters.</div>
      </div>
      <div class="rp-field">
        <label id="rp-label-confirm" for="rp-confirm">Confirm password</label>
        <input type="password" id="rp-confirm" minlength="8" required autocomplete="new-password">
      </div>
      <button type="submit" id="rp-submit" class="rp-btn">Update password</button>
      <div id="rp-form-msg" class="rp-msg" style="display:none"></div>
    </form>

    <p style="margin-top: 2.5rem;"><a href="index.html">&larr; Back to home</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var SUPA = 'https://wnbtsqfdlbjwtetppdng.supabase.co';
      var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InduYnRzcWZkbGJqd3RldHBwZG5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDQwMDAsImV4cCI6MjA5MzcyMDAwMH0.7mvR-FGSAzTZGRUzcz0tkGmNxWX3uwDxhtejrcwxxPM';
      var STORAGE_KEY = 'runpik_reset_locale';

      var T = {
        en: {
          title: 'Reset your password',
          subtitle: 'Choose a new password for your Runpik account.',
          labelPass: 'New password', labelConfirm: 'Confirm password',
          hint: 'At least 8 characters.', submit: 'Update password',
          verifying: 'Verifying your reset link…',
          noToken: 'This page must be opened from the password-reset link in your email. Please open that link, or request a new one from the app.',
          invalid: 'This reset link is invalid or has expired. Please request a new password reset from the Runpik app.',
          mismatch: 'The two passwords do not match.',
          tooShort: 'Password must be at least 8 characters.',
          updating: 'Updating…',
          success: 'Your password has been updated. Go back to the Runpik app and sign in with your new password.',
          genericErr: 'Something went wrong. Please try again or request a new reset link.',
        },
        ru: {
          title: 'Сброс пароля',
          subtitle: 'Задайте новый пароль для вашего аккаунта Runpik.',
          labelPass: 'Новый пароль', labelConfirm: 'Повторите пароль',
          hint: 'Минимум 8 символов.', submit: 'Сменить пароль',
          verifying: 'Проверяем ссылку для сброса…',
          noToken: 'Эту страницу нужно открывать по ссылке из письма для сброса пароля. Откройте ту ссылку или запросите новую в приложении.',
          invalid: 'Ссылка для сброса недействительна или истекла. Запросите новый сброс пароля в приложении Runpik.',
          mismatch: 'Пароли не совпадают.',
          tooShort: 'Пароль должен быть не менее 8 символов.',
          updating: 'Сохраняем…',
          success: 'Пароль обновлён. Вернитесь в приложение Runpik и войдите с новым паролем.',
          genericErr: 'Что-то пошло не так. Попробуйте снова или запросите новую ссылку.',
        },
      };

      var lang = (function () {
        try { var s = localStorage.getItem(STORAGE_KEY); if (s === 'en' || s === 'ru') return s; } catch (e) {}
        return (navigator.language || 'en').toLowerCase().startsWith('ru') ? 'ru' : 'en';
      })();

      var statusEl = document.getElementById('rp-status');
      var formEl = document.getElementById('rp-form');
      var formMsg = document.getElementById('rp-form-msg');
      var passEl = document.getElementById('rp-pass');
      var confirmEl = document.getElementById('rp-confirm');
      var submitEl = document.getElementById('rp-submit');
      var verified = false;
      var done = false;

      function applyLang(l) {
        lang = l;
        try { localStorage.setItem(STORAGE_KEY, l); } catch (e) {}
        document.documentElement.lang = l;
        var t = T[l];
        document.getElementById('rp-title').textContent = t.title;
        document.getElementById('rp-subtitle').textContent = t.subtitle;
        document.getElementById('rp-label-pass').textContent = t.labelPass;
        document.getElementById('rp-label-confirm').textContent = t.labelConfirm;
        document.getElementById('rp-hint').textContent = t.hint;
        if (!done) submitEl.textContent = t.submit;
        document.querySelectorAll('.locale-toggle button').forEach(function (b) {
          b.classList.toggle('active', b.dataset.locale === l);
        });
      }
      document.querySelectorAll('.locale-toggle button').forEach(function (b) {
        b.addEventListener('click', function () { applyLang(b.dataset.locale); });
      });

      function showStatus(kind, text) {
        statusEl.style.display = 'block';
        statusEl.className = 'rp-msg ' + kind;
        statusEl.textContent = text;
      }
      function showFormMsg(kind, text) {
        formMsg.style.display = 'block';
        formMsg.className = 'rp-msg ' + kind;
        formMsg.textContent = text;
      }

      applyLang(lang);

      var supa = window.supabase.createClient(SUPA, ANON, {
        auth: { detectSessionInUrl: false, persistSession: false, autoRefreshToken: false },
      });

      // Read token_hash from the email link.
      var params = new URLSearchParams(window.location.search);
      var tokenHash = params.get('token_hash');
      var type = params.get('type') || 'recovery';

      if (!tokenHash) {
        showStatus('err', T[lang].noToken);
      } else {
        showStatus('ok', T[lang].verifying);
        supa.auth.verifyOtp({ type: type, token_hash: tokenHash }).then(function (res) {
          if (res.error) {
            showStatus('err', T[lang].invalid);
          } else {
            verified = true;
            statusEl.style.display = 'none';
            formEl.classList.remove('rp-hide');
            passEl.focus();
          }
        }).catch(function () {
          showStatus('err', T[lang].invalid);
        });
      }

      formEl.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!verified || done) return;
        formMsg.style.display = 'none';
        var t = T[lang];
        var p = passEl.value, c = confirmEl.value;
        if (p.length < 8) { showFormMsg('err', t.tooShort); return; }
        if (p !== c) { showFormMsg('err', t.mismatch); return; }
        submitEl.disabled = true;
        submitEl.textContent = t.updating;
        supa.auth.updateUser({ password: p }).then(function (res) {
          if (res.error) {
            submitEl.disabled = false; submitEl.textContent = t.submit;
            showFormMsg('err', res.error.message || t.genericErr);
          } else {
            done = true;
            formEl.reset();
            passEl.disabled = true; confirmEl.disabled = true;
            submitEl.style.display = 'none';
            showFormMsg('ok', t.success);
          }
        }).catch(function () {
          submitEl.disabled = false; submitEl.textContent = t.submit;
          showFormMsg('err', t.genericErr);
        });
      });
    })();
  </script>
</body>
</html>
